<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ether Nexus | OUTER- NEWS</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #010205;
            overflow: hidden;
            color: #f8fafc;
        }

        /* ==================== 3D CANVAS ==================== */
        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .nexus-grid-horizon {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(255, 42, 109, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: 2;
        }

        /* ==================== OUTER NEWS VIEW ==================== */
        .outer-news-layout {
            position: relative;
            display: flex;
            width: 100%;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* Allow interaction with children only */
        }

        .outer-news-nav {
            width: 300px;
            background: rgba(5, 8, 15, 0.6);
            border-right: 1px solid var(--border-glass);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            backdrop-filter: blur(20px);
            pointer-events: auto;
        }

        .outer-logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--alert);
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 42, 109, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .outer-logo::before {
            content: '◉';
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            color: #8899aa;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background: rgba(255, 42, 109, 0.1);
            border-color: rgba(255, 42, 109, 0.3);
            color: var(--alert);
        }

        .nav-badge {
            margin-left: auto;
            background: var(--alert);
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        .outer-news-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            pointer-events: auto;
        }

        .outer-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .outer-title { font-size: 28px; font-weight: 300; letter-spacing: 3px; }
        .outer-subtitle { font-size: 12px; color: #667788; margin-top: 4px; letter-spacing: 1px; }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--alert);
            font-weight: 700;
        }

        .live-dot {
            width: 8px; height: 8px;
            background: var(--alert);
            border-radius: 50%;
            animation: blink 1s infinite;
            box-shadow: 0 0 10px var(--alert);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .outer-feed {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            grid-auto-rows: minmax(280px, auto);
            gap: 24px;
            grid-auto-flow: dense;
            align-content: start;
        }

        .outer-card {
            background: rgba(15, 20, 30, 0.7);
            border: 1px solid rgba(255, 42, 109, 0.15);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
            animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
            cursor: pointer;
        }

        /* Bento Variants */
        .outer-card.featured { grid-column: span 1; grid-row: span 2; }
        @media (min-width: 1400px) {
            .outer-card.featured { grid-column: span 2; grid-row: span 2; }
            .outer-card.wide { grid-column: span 2; }
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .outer-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: var(--alert);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255, 42, 109, 0.1);
        }

        .card-image-box {
            position: relative;
            width: 100%;
            height: 160px;
            flex-shrink: 0;
            overflow: hidden;
            background: #000;
        }
        .featured .card-image-box { height: 320px; }
        .wide .card-image-box { height: 200px; }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.6s ease;
        }
        .outer-card:hover .card-image { opacity: 1; transform: scale(1.05); }

        .card-image-placeholder { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; font-size: 32px; color: rgba(255,42,109,0.2); }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
            background: linear-gradient(to bottom, rgba(20, 25, 35, 1), rgba(10, 12, 18, 1));
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-source { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; color: var(--alert); }
        .card-timestamp { font-family: monospace; font-size: 11px; color: #556677; }
        .card-headline { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 10px; color: #fff; }
        .card-excerpt { font-size: 13px; line-height: 1.7; color: #8899aa; margin-bottom: 16px; flex: 1; }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .card-category { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #556677; font-weight: 600; }

        .card-read-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--alert);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(255,42,109,0.3);
            border-radius: 20px;
            background: rgba(255, 42, 109, 0.05);
            transition: all 0.2s;
        }

        .card-read-link:hover {
            background: rgba(255,42,109,0.15);
            border-color: var(--alert);
        }

        .outer-feed-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            gap: 16px;
            color: #556677;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .outer-feed-loading::before {
            content: '';
            width: 32px; height: 32px;
            border: 2px solid rgba(255,42,109,0.2);
            border-top-color: var(--alert);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .outer-feed-error { padding: 40px; text-align: center; color: #556677; font-size: 13px; line-height: 1.8; }
        .outer-feed-error strong { color: var(--alert); display: block; margin-bottom: 8px; font-size: 15px; }

        /* ==================== NAV SECTION ==================== */
        .nav-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #556677;
            font-weight: 700;
        }

        /* ==================== FEED CONTAINER ==================== */
        .outer-feed-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            pointer-events: auto;
        }

        /* ==================== AMBIENT REVEAL ==================== */
        #ambient-reveal {
            position: fixed;
            inset: 0;
            z-index: 5000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }

        #ambient-reveal.is-active { opacity: 1; }

        .scanline {
            position: absolute;
            top: -2%;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, transparent, var(--alert), transparent);
            box-shadow: 0 0 40px 10px rgba(255, 42, 109, 0.5);
        }

        .scanline.animate {
            animation: scanDown 1.5s ease-in-out forwards;
        }

        @keyframes scanDown {
            from { top: -2%; }
            to   { top: 102%; }
        }

        /* ==================== LAYOUT REVEAL ==================== */
        #mainLayout {
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #mainLayout.is-synced { opacity: 1; }

        /* ==================== DETAIL OVERLAY ==================== */
        #news-detail-overlay {
            position: fixed;
            inset: 0;
            z-index: 4000;
            background: rgba(1, 2, 5, 0.95);
            backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s, visibility 0.4s;
        }

        #news-detail-overlay.is-active {
            opacity: 1;
            visibility: visible;
        }

        .detail-window {
            position: relative;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            background: rgba(10, 12, 20, 0.98);
            border: 1px solid var(--alert);
            border-radius: 32px;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px;
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #news-detail-overlay.is-active .detail-window {
            transform: scale(1);
        }

        .detail-window::-webkit-scrollbar { width: 6px; }
        .detail-window::-webkit-scrollbar-track { background: transparent; }
        .detail-window::-webkit-scrollbar-thumb { background: rgba(255,42,109,0.3); border-radius: 3px; }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 42, 109, 0.1);
            border: 1px solid rgba(255, 42, 109, 0.3);
            color: var(--alert);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .close-btn:hover {
            background: rgba(255, 42, 109, 0.2);
            border-color: var(--alert);
        }

        @media (max-width: 1024px) {
            .nav-buttons { right: 20px; top: 20px; }
            .outer-news-nav { width: 100%; height: auto; }
            .outer-news-layout { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Toast notifications -->
    <div id="nexus-toasts"></div>

    <div id="ambient-reveal">
        <div class="scanline"></div>
    </div>

    <div id="news-detail-overlay">
        <div class="detail-window">
            <button class="close-btn" onclick="closeDetail()">EXIT [ESC]</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- 3D BACKGROUND LAYER -->
    <div id="canvas-container"></div>
    <div class="nexus-grid-horizon"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- OUTER NEWS VIEW -->
    <div class="outer-news-layout" id="mainLayout">
        <nav class="outer-news-nav">
            <div class="outer-logo">OUTER-</div>

            <div class="nav-section">
                <div class="nav-title">Feeds</div>
                <div class="nav-item active" data-category="">
                    <span>◈</span> Top Stories
                    <span class="nav-badge">LIVE</span>
                </div>
                <div class="nav-item" data-category="general"><span>▲</span> General</div>
                <div class="nav-item" data-category="business"><span>◎</span> Business</div>
                <div class="nav-item" data-category="technology"><span>◉</span> Technology</div>
                <div class="nav-item" data-category="science"><span>◫</span> Science</div>
                <div class="nav-item" data-category="health"><span>♦</span> Health</div>
                <div class="nav-item" data-category="entertainment"><span>★</span> Entertainment</div>
                <div class="nav-item" data-category="sports"><span>◐</span> Sports</div>
            </div>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 12px;">
                <div style="padding: 16px; background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.2); border-radius: 16px;">
                    <p style="font-size: 10px; color: #00e5ff; letter-spacing: 1px; margin: 0 0 5px;">OPERATOR_LINK</p>
                    <div id="userNameDisplay" style="font-size: 14px; font-weight: 800;">GUEST_USER</div>
                </div>
                <a class="back-btn" href="standard.html">
                    <span>←</span> Return to Standard
                </a>
            </div>
        </nav>

        <main class="outer-feed-container">
            <header class="outer-header">
                <div>
                    <div class="outer-title">OUTER- NEWS</div>
                    <div class="outer-subtitle">External intelligence network // Unfiltered sector broadcasts</div>
                </div>
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    LIVE FEED
                </div>
            </header>

            <div class="outer-feed" id="outerFeed"></div>
        </main>
    </div>

    <!-- AUTHENTICATION OVERLAY -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-vignette"></div>
        <div class="auth-crt"></div>
        <div class="auth-boot-seq" id="authBootSeq"></div>
        <div class="auth-morph state-hidden" id="authMorph">
            <div class="auth-card" id="authCard">
                <h2>NCPD_NET</h2>
                <div class="auth-subtitle">SECURE AUTHENTICATION PROTOCOL v9.4</div>
                <form id="authForm" class="auth-form">
                    <div class="auth-input-group">
                        <label class="auth-input-label">Operator ID</label>
                        <input type="text" id="authUsername" class="auth-input" placeholder="Enter designation..." autocomplete="username" required>
                    </div>
                    <div class="auth-input-group">
                        <label class="auth-input-label">Neural Passkey</label>
                        <input type="password" id="authPassword" class="auth-input" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="auth-submit">Link</button>
                </form>
                <div id="authError" style="color:var(--cp-red);font-family:var(--font-mono-cp);font-size:12px;text-align:center;margin-top:16px;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== PARTICLE SHADERS ====================
        const PARTICLE_VERT = `
            uniform float time;
            uniform float baseSize;
            attribute float aPhase;
            void main() {
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                float pulse = 1.0 + 0.35 * sin(time * 2.0 + aPhase);
                gl_PointSize = baseSize * pulse * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const PARTICLE_FRAG = `
            uniform vec3 color;
            uniform float opacity;
            void main() {
                vec2 uv = gl_PointCoord - vec2(0.5);
                float dist = length(uv);
                if (dist > 0.5) discard;
                float glow = pow(1.0 - smoothstep(0.0, 0.5, dist), 2.2);
                float alpha = glow * opacity;
                gl_FragColor = vec4(color, alpha);
            }
        `;

        // ==================== 3D BACKGROUND ENGINE ====================
        class NewsBackground {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x010205);
                this.scene.fog = new THREE.FogExp2(0x010205, 0.002);

                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
                this.camera.position.set(0, 100, 500);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                this.targetColor = new THREE.Color(0xff2a6d);
                this.pulseStartTime = null;
                this.clock = new THREE.Clock();

                this.mouse = new THREE.Vector2(0, 0);
                window.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.init();
            }

            init() {
                // Grid
                const grid = new THREE.GridHelper(2000, 40, 0xff2a6d, 0x1a050d);
                grid.position.y = -100;
                grid.material.transparent = true;
                grid.material.opacity = 0.15;
                this.scene.add(grid);

                // Floating Particles
                const count = 1500;
                const pos = new Float32Array(count * 3);
                const phase = new Float32Array(count);
                for(let i=0; i<count; i++) {
                    pos[i*3] = (Math.random()-0.5)*1200;
                    pos[i*3+1] = (Math.random()-0.5)*800;
                    pos[i*3+2] = (Math.random()-0.5)*1200;
                    phase[i] = Math.random() * Math.PI * 2;
                }
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                geo.setAttribute('aPhase', new THREE.BufferAttribute(phase, 1));
                
                this.pMat = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 },
                        baseSize: { value: 4 },
                        color: { value: new THREE.Color(0xff2a6d) },
                        opacity: { value: 0.4 }
                    },
                    vertexShader: PARTICLE_VERT,
                    fragmentShader: PARTICLE_FRAG,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                
                this.particles = new THREE.Points(geo, this.pMat);
                this.scene.add(this.particles);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                this.animate();
            }

            onMouseMove(event) {
                this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }

            updateTheme(category) {
                const themes = {
                    '': 0xff2a6d,           // Top Stories (Alert Pink)
                    'general': 0xff2a6d,
                    'business': 0xfcee0a,    // Gold/Yellow
                    'technology': 0x00e5ff,  // Cyan (Primary)
                    'science': 0xb300ff,     // Purple (Secondary)
                    'health': 0x00ff88,      // Green
                    'entertainment': 0xff00ff, // Magenta
                    'sports': 0xff8800       // Orange
                };
                this.targetColor = new THREE.Color(themes[category] || 0xff2a6d);
                this.pulseStartTime = Date.now();
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const time = this.clock.getElapsedTime();
                this.pMat.uniforms.time.value = time;
                this.particles.rotation.y = time * 0.05;

                // Subtle camera tilt based on mouse
                this.camera.position.x += (this.mouse.x * 40 - this.camera.position.x) * 0.05;
                this.camera.position.y += (-(this.mouse.y * 40 - 100) - this.camera.position.y) * 0.05;
                this.camera.lookAt(0, 0, 0);

                // Smooth color transition
                this.pMat.uniforms.color.value.lerp(this.targetColor, 0.05);

                // Pulse reaction effect on category change
                if (this.pulseStartTime) {
                    const elapsed = Date.now() - this.pulseStartTime;
                    if (elapsed < 1000) {
                        const burst = Math.sin((elapsed / 1000) * Math.PI);
                        this.pMat.uniforms.baseSize.value = 4 + (burst * 8);
                    } else {
                        this.pMat.uniforms.baseSize.value = 4;
                        this.pulseStartTime = null;
                    }
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==================== DETAIL MODAL ====================
        window.openDetail = (article) => {
            const overlay = document.getElementById('news-detail-overlay');
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <p style="color: var(--alert); font-weight: 800; letter-spacing: 4px; margin-bottom: 10px;" id="typewriter-tag">DECRYPTED_INTEL</p>
                <h1 style="font-size: 36px; line-height: 1.1; margin-bottom: 20px;" id="typewriter-title">${article.title}</h1>
                <p style="color: #64748b; font-size: 14px; margin-bottom: 30px;">SOURCE: ${article.source?.name} // RELAY: SECTOR_0${Math.floor(Math.random()*9)}</p>
                <div style="font-size: 18px; line-height: 1.8; color: #cbd5e1;" id="typewriter-body"></div>
                <div style="margin-top: 40px; padding: 25px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--border-glass);">
                    <p style="font-size: 13px; color: #8899aa; margin-bottom: 15px;">Uplink established. You are viewing the decrypted summary of this broadcast.</p>
                    <a href="${article.url}" target="_blank" rel="noopener noreferrer" style="color: var(--alert); text-decoration: none; font-weight: 700; font-size: 14px;">CONTINUE TO FULL SOURCE →</a>
                </div>
            `;
            overlay.classList.add('is-active');

            // Typewriter effect trigger for body content
            const bodyEl = document.getElementById('typewriter-body');
            const text = article.description || article.content || 'No detailed transmission available.';
            let i = 0;
            const interval = setInterval(() => {
                bodyEl.textContent += text[i];
                i++;
                if (i >= text.length) clearInterval(interval);
            }, 12);
        };

        window.closeDetail = () => document.getElementById('news-detail-overlay').classList.remove('is-active');
        document.addEventListener('keydown', (e) => e.key === "Escape" && closeDetail());

        // ==================== AUTHENTICATION MANAGER ====================
        class AuthManager {
            constructor() {
                this.overlay = document.getElementById('authOverlay');
                this.form = document.getElementById('authForm');
                this.error = document.getElementById('authError');
                this.init();
            }
            init() {
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                const saved = localStorage.getItem('nexus_user');
                if (saved) {
                    try { this.finishAuth(JSON.parse(saved)); return; }
                    catch (e) { localStorage.removeItem('nexus_user'); }
                }
            }
            handleSubmit(e) {
                e.preventDefault();
                this.error.textContent = '';
                const username = document.getElementById('authUsername').value.trim();
                const password = document.getElementById('authPassword').value;
                if (!username) { this.error.textContent = 'Operator ID required'; return; }
                if (password.length < 4) { this.error.textContent = 'Passkey too short'; return; }
                const color = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
                const user = { id: 'u_' + Date.now(), username, color };
                localStorage.setItem('nexus_user', JSON.stringify(user));
                this.finishAuth(user);
            }
            finishAuth(user) {
                if(this.overlay) this.overlay.classList.add('hidden');
                document.getElementById('userNameDisplay').textContent = user.username.toUpperCase();
                triggerAmbientReveal();
                initApp(user);
            }
        }

        function triggerAmbientReveal() {
            const layout = document.getElementById('mainLayout');
            const reveal = document.getElementById('ambient-reveal');
            const scanline = reveal.querySelector('.scanline');

            reveal.classList.add('is-active');
            scanline.classList.add('animate');

            setTimeout(() => { layout.classList.add('is-synced'); }, 1000);
            setTimeout(() => { reveal.classList.remove('is-active'); }, 3500);
        }

        // ==================== TOAST MANAGER ====================
        class ToastManager {
            constructor() {
                this.container = document.getElementById('nexus-toasts');
                this.icons = { success: '◈', warning: '▲', error: '✕', info: '◉' };
            }
            show(message, type = 'info', duration = 4000) {
                const toast = document.createElement('div');
                toast.className = `nexus-toast toast-${type}`;
                toast.innerHTML = `<span class="toast-icon">${this.icons[type] ?? '◉'}</span><span class="toast-message">${message}</span>`;
                this.container.appendChild(toast);
                const dismiss = () => {
                    if (toast.classList.contains('toast-exit')) return;
                    toast.classList.add('toast-exit');
                    setTimeout(() => toast.parentNode?.removeChild(toast), 320);
                };
                setTimeout(dismiss, duration);
                toast.addEventListener('click', dismiss);
            }
        }

        // ==================== OUTER NEWS CONTROLLER ====================
        class OuterNewsController {
            constructor() {
                this.feedEl = document.getElementById('outerFeed');
                this.navItems = document.querySelectorAll('.nav-item');
                this.currentCategory = '';
                this.setupNavigation();
                this.fetchNews('');
            }

            setupNavigation() {
                this.navItems.forEach(item => {
                    item.addEventListener('click', () => {
                        this.navItems.forEach(n => n.classList.remove('active'));
                        item.classList.add('active');
                        this.currentCategory = item.dataset.category;
                        this.fetchNews(this.currentCategory);
                    });
                });
            }

            async fetchNews(category) {
                window.newsBg?.updateTheme(category);
                this.feedEl.innerHTML = '<div class="outer-feed-loading">Fetching live feed...</div>';
                try {
                    const url = '/api/news' + (category ? `?category=${category}` : '');
                    const res = await fetch(url);
                    const data = await res.json();

                    if (!res.ok || data.status !== 'ok') {
                        throw new Error(data.message || data.error || 'Feed unavailable');
                    }

                    this.feedEl.innerHTML = '';
                    const articles = (data.articles || []).filter(a => a.title && a.title !== '[Removed]');
                    if (articles.length === 0) {
                        this.feedEl.innerHTML = '<div class="outer-feed-error"><strong>No articles found</strong>Try a different category.</div>';
                        return;
                    }
                    articles.forEach((article, index) => this.renderCard(article, category, index));
                } catch (err) {
                    this.feedEl.innerHTML = `<div class="outer-feed-error"><strong>Feed Unavailable</strong>${err.message}</div>`;
                }
            }

            renderCard(article, category, index) {
                const card = document.createElement('div');
                
                // Bento grid logic
                let variant = '';
                if (index % 10 === 0 || index % 10 === 7) variant = 'featured';
                else if (index % 10 === 3 || index % 10 === 8) variant = 'wide';
                card.className = `outer-card ${variant}`;

                const source = article.source?.name || 'Unknown Source';
                const time = article.publishedAt
                    ? new Date(article.publishedAt).toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                    : '';
                const desc = article.description || '';
                const cat = category || 'top stories';

                card.innerHTML = `
                    <div class="card-image-box">
                    ${article.urlToImage 
                        ? `<img class="card-image" src="${article.urlToImage}" alt="" loading="lazy" onerror="this.style.display='none'">`
                        : `<div class="card-image-placeholder">◈</div>`
                    }
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <div class="card-source">${source}</div>
                            <div class="card-timestamp">${time}</div>
                        </div>
                        <div class="card-headline">${article.title}</div>
                        ${desc ? `<div class="card-excerpt">${desc}</div>` : ''}
                        <div class="card-footer">
                            <span class="card-category">${cat}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openDetail(article);
                this.feedEl.appendChild(card);
            }
        }

        // ==================== APP INIT ====================
        let appInitialized = false;
        function initApp(userData) {
            if (appInitialized) return;
            appInitialized = true;
            window.toastManager = new ToastManager();
            window.newsBg = new NewsBackground();
            new OuterNewsController();
            window.toastManager.show(`Welcome, ${userData.username}`, 'success');
        }

        // ==================== BOOT SEQUENCE ====================
        (function initBootSequence() {
            const bootLines = [
                "INIT KERNEL... OK", "MOUNTING NEURAL DRIVES... OK",
                "CHECKING FIREWALL STATUS... WARNING: BREACH DETECTED",
                "REROUTING MAINFRAME POWER...",
                "DECRYPTING PROTOCOLS: [████████░░]",
                "DECRYPTING PROTOCOLS: [██████████] DONE",
                "ESTABLISHING SECURE HANDSHAKE...",
                "ALLOCATING MEMORY BLOCKS...", "SYSTEM READY."
            ];
            const bootSeq = document.getElementById('authBootSeq');
            const morph   = document.getElementById('authMorph');
            const card    = document.getElementById('authCard');
            if (!bootSeq || !morph || !card) return;
            bootLines.forEach((line, i) => {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'auth-boot-line';
                    p.textContent = '> ' + line;
                    bootSeq.appendChild(p);
                }, i * 200);
            });
            setTimeout(() => { bootSeq.classList.add('auth-boot-glitch'); }, 2200);
            setTimeout(() => { bootSeq.style.opacity = '0'; morph.className = 'auth-morph state-dot'; }, 2600);
            setTimeout(() => { morph.className = 'auth-morph state-line'; }, 3000);
            setTimeout(() => { morph.className = 'auth-morph state-box'; }, 3600);
            setTimeout(() => { card.classList.add('content-visible'); }, 4200);
        })();

        new AuthManager();
    </script>
