<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ether Nexus</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }

        #canvas-container {
            width: 100%; height: 100%;
            position: absolute;
            top: 0; left: 0;
        }

        .nexus-grid-horizon {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,229,255,0.04) 0%, transparent 30%);
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="nexus-grid-horizon"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== STATE ====================
        class NexusState {
            constructor() { this.users = new Map(); }
            addUser(user) { this.users.set(user.id, user); }
        }
        const state = new NexusState();

        // ==================== 3D NEXUS CONTROLLER ====================
        class ParticleChatNexus {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.isActive = true;

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x000000);
                this.scene.fog = null;

                this.camera = new THREE.PerspectiveCamera(75, this.container.clientWidth / this.container.clientHeight, 0.1, 300);
                this.camera.position.set(0, 0, 26);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                this.lookTarget = new THREE.Vector3();
                this.clock = new THREE.Clock();
                this.particleTexture = this.createParticleTexture();
                this.volumeRadius = 18;
                this.mouse = { x: 0, y: 0 };

                this.init();
            }

            async init() {
                this.createEnvironment();

                window.addEventListener('resize', () => {
                    if (!this.isActive) return;
                    this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
                });

                this.animate();
            }

            createParticleTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(0.15, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(0.4, 'rgba(255,255,255,0.2)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 64, 64);
                return new THREE.CanvasTexture(canvas);
            }

            createEnvironment() {
                const dustGeo = new THREE.BufferGeometry();
                const dustCount = 1200;
                const dustPos = new Float32Array(dustCount * 3);
                for (let i = 0; i < dustCount; i++) {
                    dustPos[i*3]   = (Math.random() - 0.5) * 40;
                    dustPos[i*3+1] = (Math.random() - 0.5) * 40;
                    dustPos[i*3+2] = (Math.random() - 0.5) * 40;
                }
                dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
                const dustMat = new THREE.PointsMaterial({
                    color: 0x557799, size: 0.06, map: this.particleTexture,
                    transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false
                });
                this.dust = new THREE.Points(dustGeo, dustMat);
                this.scene.add(this.dust);

                const coreGeo = new THREE.IcosahedronGeometry(1.5, 2);
                const coreMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.06 });
                this.nexusCore = new THREE.Mesh(coreGeo, coreMat);
                this.scene.add(this.nexusCore);

                this.createStarfield();
                this.createNeonGrid();
            }

            createStarfield() {
                const count = 1400;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r = 20 + Math.random() * 15;
                    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i*3+2] = r * Math.cos(phi);
                    const t = Math.random();
                    colors[i*3]   = 0.72 + t * 0.28;
                    colors[i*3+1] = 0.82 + t * 0.12;
                    colors[i*3+2] = 1.0;
                }
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
                this.stars = new THREE.Points(geo, new THREE.PointsMaterial({
                    size: 0.06, vertexColors: true, transparent: true, opacity: 0.85,
                    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
                }));
                this.scene.add(this.stars);
            }

            createNeonGrid() {
                const grid = new THREE.GridHelper(60, 40, 0x00e5ff, 0x001833);
                grid.position.y = -7;
                grid.material.transparent = true; grid.material.opacity = 0.3;
                grid.material.blending = THREE.AdditiveBlending; grid.material.depthWrite = false;
                this.scene.add(grid);

                const gridCoarse = new THREE.GridHelper(60, 8, 0xb300ff, 0x000000);
                gridCoarse.position.y = -7;
                gridCoarse.material.transparent = true; gridCoarse.material.opacity = 0.2;
                gridCoarse.material.blending = THREE.AdditiveBlending; gridCoarse.material.depthWrite = false;
                this.scene.add(gridCoarse);
            }

            addUser(userData) {
                const numSystems = 12;
                const particlesPerSystem = 40;
                const cloudRadius = 3.0;
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ'.split('');

                const userGroup = new THREE.Group();
                const particleSystems = [];

                for (let s = 0; s < numSystems; s++) {
                    const cvs = document.createElement('canvas');
                    cvs.width = 64; cvs.height = 64;
                    const ctx = cvs.getContext('2d');
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillStyle = `hsl(120, 100%, ${Math.floor(Math.random() * 30 + 30)}%)`;
                    ctx.font = 'bold 48px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = '#00FF00';
                    ctx.shadowBlur = 10;
                    ctx.fillText(char, 32, 32);

                    const texture = new THREE.CanvasTexture(cvs);
                    const baseOpacity = Math.random() * 0.4 + 0.4;
                    const baseSize = 0.3 + Math.random() * 0.3;
                    const material = new THREE.PointsMaterial({
                        size: baseSize, map: texture,
                        transparent: true, opacity: baseOpacity,
                        blending: THREE.AdditiveBlending, depthWrite: false,
                    });

                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(particlesPerSystem * 3);
                    const baseData = new Float32Array(particlesPerSystem * 4);

                    for (let j = 0; j < particlesPerSystem; j++) {
                        const u = Math.random();
                        const radius = cloudRadius * Math.pow(u, 0.4);
                        const theta = Math.random() * 2 * Math.PI;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const bx = radius * Math.sin(phi) * Math.cos(theta);
                        const by = radius * Math.sin(phi) * Math.sin(theta);
                        const bz = radius * Math.cos(phi);
                        positions[j*3] = bx; positions[j*3+1] = by; positions[j*3+2] = bz;
                        baseData[j*4] = bx; baseData[j*4+1] = by; baseData[j*4+2] = bz;
                        baseData[j*4+3] = Math.random() * Math.PI * 2;
                    }

                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    const points = new THREE.Points(geometry, material);
                    points.userData.baseData = baseData;
                    points.userData.baseOpacity = baseOpacity;
                    points.userData.baseSize = baseSize;
                    userGroup.add(points);
                    particleSystems.push(points);
                }

                userGroup.position.set((Math.random()-0.5)*28, (Math.random()-0.5)*16, (Math.random()-0.5)*10);
                this.scene.add(userGroup);

                const user = {
                    ...userData,
                    mesh: userGroup,
                    particleSystems,
                    radius: 3.5 + Math.random() * 0.5,
                    mass: 1 + Math.random() * 0.5,
                    velocity: new THREE.Vector3((Math.random()-0.5)*3, (Math.random()-0.5)*3, (Math.random()-0.5)*2),
                    flyTimer: Math.random() * 1.2,
                    flyTarget: new THREE.Vector3((Math.random()-0.5)*28, (Math.random()-0.5)*16, (Math.random()-0.5)*10),
                    isHovering: false,
                    phase: Math.random() * Math.PI * 2
                };
                state.addUser(user);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                if (!this.isActive) return;

                const deltaTime = Math.min(this.clock.getDelta(), 0.1);
                const time = this.clock.elapsedTime;
                const timeScale = deltaTime * 60;

                // Fish-tank glass parallax: mouse tilts the viewpoint slightly
                this.lookTarget.x += (this.mouse.x * 4 - this.lookTarget.x) * 0.03;
                this.lookTarget.y += (-this.mouse.y * 3 - this.lookTarget.y) * 0.03;
                this.camera.lookAt(this.lookTarget);

                // Slow idle bob
                this.camera.position.y += Math.sin(time * 0.25) * 0.0015;
                this.camera.position.x += Math.cos(time * 0.18) * 0.0015;

                if (this.dust) this.dust.rotation.y = time * 0.015;
                if (this.nexusCore) {
                    this.nexusCore.rotation.y -= deltaTime * 0.2;
                    this.nexusCore.rotation.x -= deltaTime * 0.1;
                    this.nexusCore.material.opacity = 0.02 + Math.sin(time * 2) * 0.01;
                }
                if (this.stars) this.stars.rotation.y = time * 0.004;

                const usersArray = Array.from(state.users.values());

                // --- PHYSICS COLLISION LOOP ---
                for (let i = 0; i < usersArray.length; i++) {
                    for (let j = i + 1; j < usersArray.length; j++) {
                        const a = usersArray[i];
                        const b = usersArray[j];
                        const diff = new THREE.Vector3().subVectors(b.mesh.position, a.mesh.position);
                        const dist = diff.length();
                        const minDist = a.radius + b.radius;

                        if (dist < minDist && dist > 0.001) {
                            diff.normalize();
                            const overlap = minDist - dist;
                            const force = overlap * 0.02;
                            a.velocity.add(diff.clone().multiplyScalar(-force * (b.mass / (a.mass + b.mass))));
                            b.velocity.add(diff.clone().multiplyScalar(force * (a.mass / (a.mass + b.mass))));

                            const relativeVel = new THREE.Vector3().subVectors(a.velocity, b.velocity);
                            const impact = relativeVel.dot(diff);
                            if (impact < 0) {
                                const impulse = diff.clone().multiplyScalar(impact * 0.15);
                                a.velocity.sub(impulse);
                                b.velocity.add(impulse);
                            }

                            if (a.particleSystems) a.particleSystems.forEach(p => { p.material.size = p.userData.baseSize * 1.4; });
                            if (b.particleSystems) b.particleSystems.forEach(p => { p.material.size = p.userData.baseSize * 1.4; });
                            setTimeout(() => {
                                if (a?.particleSystems) a.particleSystems.forEach(p => { p.material.size = p.userData.baseSize; });
                                if (b?.particleSystems) b.particleSystems.forEach(p => { p.material.size = p.userData.baseSize; });
                            }, 120);
                        }
                    }
                }

                state.users.forEach((user) => {
                    if (user.particleSystems) {
                        for (const pts of user.particleSystems) {
                            const positions = pts.geometry.attributes.position.array;
                            const baseData = pts.userData.baseData;
                            for (let i = 0; i < positions.length / 3; i++) {
                                const idx3 = i * 3, idx4 = i * 4;
                                const bx = baseData[idx4], by = baseData[idx4+1], bz = baseData[idx4+2], phase = baseData[idx4+3];
                                const dist = Math.sqrt(bx*bx + by*by + bz*bz);
                                const spinSpeed = 0.15 + (1.0 / (dist + 1));
                                const angle = time * spinSpeed;
                                const cosA = Math.cos(angle), sinA = Math.sin(angle);
                                positions[idx3]   = bx * cosA - bz * sinA;
                                positions[idx3+1] = by + Math.sin(time * 1.5 + phase) * 0.4;
                                positions[idx3+2] = bx * sinA + bz * cosA;
                            }
                            pts.geometry.attributes.position.needsUpdate = true;
                        }
                    }

                    const breathScale = 1 + Math.sin(time * 2 + user.phase) * 0.03;
                    user.mesh.scale.set(breathScale, breathScale, breathScale);

                    // --- FLY BEHAVIOR ---
                    user.flyTimer -= deltaTime;
                    if (user.flyTimer <= 0) {
                        user.isHovering = !user.isHovering;
                        if (user.isHovering) {
                            user.flyTimer = 0.1 + Math.random() * 0.35;
                        } else {
                            user.flyTimer = 0.3 + Math.random() * 1.6;
                            user.flyTarget.set(
                                (Math.random() - 0.5) * this.volumeRadius * 2.2,
                                (Math.random() - 0.5) * this.volumeRadius * 1.2,
                                (Math.random() - 0.5) * this.volumeRadius * 0.7
                            );
                        }
                    }

                    let currentTarget, maxSpeed, maxForce;
                    if (user.isHovering) {
                        currentTarget = user.mesh.position.clone().add(
                            new THREE.Vector3((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2)
                        );
                        maxSpeed = 0.12; maxForce = 0.08;
                    } else {
                        currentTarget = user.flyTarget;
                        maxSpeed = 2.8 + Math.random() * 1.4; maxForce = 0.4;
                    }

                    // Soft z boundaries
                    if (user.mesh.position.z > 6)  user.velocity.z -= 0.1;
                    if (user.mesh.position.z < -6) user.velocity.z += 0.1;

                    const desired = currentTarget.clone().sub(user.mesh.position);
                    if (desired.length() > 0.1) {
                        desired.normalize().multiplyScalar(maxSpeed);
                        const steer = desired.sub(user.velocity);
                        steer.clampLength(0, maxForce * timeScale);
                        user.velocity.add(steer);
                    }

                    // Separation
                    usersArray.forEach(other => {
                        if (other === user) return;
                        const diff = new THREE.Vector3().subVectors(user.mesh.position, other.mesh.position);
                        const dist = diff.length();
                        if (dist < 9 && dist > 0.001) {
                            user.velocity.add(diff.normalize().multiplyScalar(((9 - dist) / 9) * 0.06));
                        }
                    });

                    // Boundary
                    if (user.mesh.position.length() > this.volumeRadius) {
                        user.velocity.add(user.mesh.position.clone().normalize().multiplyScalar(-0.05));
                    }

                    user.velocity.multiplyScalar(user.isHovering ? 0.82 : 0.97);
                    user.velocity.clampLength(0, user.isHovering ? 0.15 : 3.5);
                    user.mesh.position.add(user.velocity.clone().multiplyScalar(timeScale));
                });

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==================== BOOT ====================
        const nexusApp = new ParticleChatNexus();

        const ENTITIES = [
            { id: 'e1', username: 'Nova'   },
            { id: 'e2', username: 'Cipher' },
            { id: 'e3', username: 'Aura'   },
            { id: 'e4', username: 'Vortex' },
            { id: 'e5', username: 'Echo'   },
            { id: 'e6', username: 'Flux'   },
        ];
        ENTITIES.forEach(e => nexusApp.addUser(e));
    </script>
</body>
</html>
