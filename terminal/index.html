<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backroom Chat - Matrix Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #chat-container {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            width: 400px;
            max-height: 85vh;
            z-index: 10;
            background: rgba(0, 10, 0, 0.9);
            border: 1px solid #0f0;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: rgba(0, 40, 0, 0.95);
            padding: 12px 15px;
            border-bottom: 1px solid #0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #0f0;
            border-radius: 50%;
            box-shadow: 0 0 10px #0f0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .chat-title {
            color: #0f0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 300px;
            max-height: 400px;
            scrollbar-width: thin;
            scrollbar-color: #0f0 #001000;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-track {
            background: #001000;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #0f0;
        }

        .message {
            color: #0f0;
            font-size: 13px;
            line-height: 1.4;
            padding: 8px 12px;
            background: rgba(0, 50, 0, 0.3);
            border-left: 2px solid #0f0;
            animation: slideIn 0.3s ease-out;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.system {
            color: #0a0;
            font-style: italic;
            border-left-color: #0a0;
        }

        .message .timestamp {
            color: #050;
            font-size: 11px;
            margin-right: 8px;
        }

        .message .username {
            color: #fff;
            font-weight: bold;
            margin-right: 5px;
        }

        .input-container {
            display: flex;
            padding: 15px;
            background: rgba(0, 20, 0, 0.9);
            border-top: 1px solid #0f0;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            outline: none;
        }

        #message-input::placeholder {
            color: #050;
        }

        #send-btn {
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        #send-btn:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }

        @media (max-width: 768px) {
            #chat-container {
                width: calc(100% - 40px);
                right: 20px;
                left: 20px;
                top: auto;
                bottom: 20px;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div class="chat-header">
            <div class="status-dot"></div>
            <div class="chat-title">BACKROOM_TERM</div>
        </div>
        
        <div id="messages">
            <div class="message system">
                <span class="timestamp">[SYS]</span> Connection established...
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="message-input" placeholder="Enter message..." maxlength="200">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- 3D Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.insertBefore(renderer.domElement, document.body.firstChild);

        // Sprite Group
        const spriteGroup = new THREE.Group();
        scene.add(spriteGroup);

        // Create Matrix Sprite
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
        
        for (let i = 0; i < 60; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const char = chars[Math.floor(Math.random() * chars.length)];
            
            ctx.fillStyle = `hsl(120, 100%, ${Math.floor(Math.random() * 30 + 40)}%)`;
            ctx.font = 'bold 48px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#00FF00';
            ctx.shadowBlur = 15;
            ctx.fillText(char, 32, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.PointsMaterial({
                size: 0.25 + Math.random() * 0.2,
                map: texture,
                transparent: true,
                opacity: Math.random() * 0.5 + 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(25 * 3);
            const baseData = new Float32Array(25 * 4);

            for (let j = 0; j < 25; j++) {
                const radius = 2.0 * Math.pow(Math.random(), 0.4);
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                
                const bx = radius * Math.sin(phi) * Math.cos(theta);
                const by = radius * Math.sin(phi) * Math.sin(theta);
                const bz = radius * Math.cos(phi);

                positions[j * 3] = bx;
                positions[j * 3 + 1] = by;
                positions[j * 3 + 2] = bz;
                
                baseData[j * 4] = bx;
                baseData[j * 4 + 1] = by;
                baseData[j * 4 + 2] = bz;
                baseData[j * 4 + 3] = Math.random() * Math.PI * 2;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const points = new THREE.Points(geometry, material);
            points.userData = { baseData: baseData };
            spriteGroup.add(points);
        }

        // --- Bouncing Flight Movement ---
        const flyer = {
            pos: new THREE.Vector3(-3, 0, 0),
            vel: new THREE.Vector3(2.0, 1.5, 0.8), // Initial velocity - noticeable speed
            bounds: {
                x: [-5, 4],
                y: [-3, 3],
                z: [-2, 2]
            },
            time: 0
        };

        camera.position.z = 10;

        function updateFlight(delta, time) {
            flyer.time += delta;
            
            // Add fluid sine wave motion to velocity (swimming/flying effect)
            const fluidX = Math.sin(time * 0.5) * 0.3 + Math.sin(time * 1.3) * 0.2;
            const fluidY = Math.cos(time * 0.7) * 0.3 + Math.sin(time * 2.0) * 0.15;
            const fluidZ = Math.sin(time * 0.4) * 0.2;
            
            // Apply fluid motion
            flyer.vel.x += fluidX * delta;
            flyer.vel.y += fluidY * delta;
            flyer.vel.z += fluidZ * delta;
            
            // Damping to prevent infinite acceleration
            flyer.vel.multiplyScalar(0.995);
            
            // Minimum speed to keep it moving
            if (flyer.vel.length() < 1.0) {
                flyer.vel.normalize().multiplyScalar(1.0);
            }
            
            // Update position
            flyer.pos.add(flyer.vel.clone().multiplyScalar(delta));
            
            // BOUNCE off boundaries (keep it on screen)
            if (flyer.pos.x > flyer.bounds.x[1]) {
                flyer.pos.x = flyer.bounds.x[1];
                flyer.vel.x *= -0.8; // Bounce with energy loss
            }
            if (flyer.pos.x < flyer.bounds.x[0]) {
                flyer.pos.x = flyer.bounds.x[0];
                flyer.vel.x *= -0.8;
            }
            if (flyer.pos.y > flyer.bounds.y[1]) {
                flyer.pos.y = flyer.bounds.y[1];
                flyer.vel.y *= -0.8;
            }
            if (flyer.pos.y < flyer.bounds.y[0]) {
                flyer.pos.y = flyer.bounds.y[0];
                flyer.vel.y *= -0.8;
            }
            if (flyer.pos.z > flyer.bounds.z[1]) {
                flyer.pos.z = flyer.bounds.z[1];
                flyer.vel.z *= -0.8;
            }
            if (flyer.pos.z < flyer.bounds.z[0]) {
                flyer.pos.z = flyer.bounds.z[0];
                flyer.vel.z *= -0.8;
            }
            
            // Apply position
            spriteGroup.position.copy(flyer.pos);
            
            // Rotation: face direction of movement + tumble
            if (flyer.vel.length() > 0.1) {
                const lookTarget = flyer.pos.clone().add(flyer.vel);
                spriteGroup.lookAt(lookTarget);
            }
            
            // Add constant tumble for energy
            spriteGroup.rotateX(0.02);
            spriteGroup.rotateY(0.015);
            
            // Breathing scale
            const scale = 1 + Math.sin(time * 3) * 0.08;
            spriteGroup.scale.setScalar(scale);
        }

        // Transmission Particles
        const transmissionParticles = [];
        const codeChars = '01<>[]{}//;';

        function createTransmissionParticle() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const char = codeChars[Math.floor(Math.random() * codeChars.length)];
            
            ctx.fillStyle = '#0f0';
            ctx.font = 'bold 24px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#0f0';
            ctx.shadowBlur = 10;
            ctx.fillText(char, 16, 16);

            const material = new THREE.SpriteMaterial({
                map: new THREE.CanvasTexture(canvas),
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending
            });

            const startY = (Math.random() - 0.5) * 4;
            const sprite = new THREE.Sprite(material);
            sprite.position.set(4, startY, 0);
            sprite.scale.set(0.3, 0.3, 0.3);
            scene.add(sprite);

            transmissionParticles.push({
                sprite: sprite,
                start: new THREE.Vector3(4, startY, 0),
                speed: 0.03 + Math.random() * 0.02,
                progress: 0
            });
        }

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.05); // Cap for stability
            const time = clock.getElapsedTime();
            
            // Update bouncing flight
            updateFlight(delta, time);
            
            // Camera gently follows
            camera.position.x += (flyer.pos.x * 0.3 - camera.position.x) * 0.05;
            camera.position.y += (flyer.pos.y * 0.3 - camera.position.y) * 0.05;
            camera.lookAt(flyer.pos);
            
            // Update internal particles
            spriteGroup.children.forEach(points => {
                const positions = points.geometry.attributes.position.array;
                const baseData = points.userData.baseData;
                
                for (let i = 0; i < 25; i++) {
                    const idx3 = i * 3;
                    const idx4 = i * 4;
                    
                    const bx = baseData[idx4];
                    const by = baseData[idx4 + 1];
                    const bz = baseData[idx4 + 2];
                    const phase = baseData[idx4 + 3];
                    
                    const angle = time * 0.5 + phase;
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);
                    
                    positions[idx3] = bx * cosA - bz * sinA;
                    positions[idx3 + 1] = by + Math.sin(time * 2 + phase) * 0.2;
                    positions[idx3 + 2] = bx * sinA + bz * cosA;
                }
                points.geometry.attributes.position.needsUpdate = true;
            });
            
            // Update transmission particles
            for (let i = transmissionParticles.length - 1; i >= 0; i--) {
                const tp = transmissionParticles[i];
                tp.progress += tp.speed;
                
                if (tp.progress >= 1) {
                    scene.remove(tp.sprite);
                    transmissionParticles.splice(i, 1);
                    continue;
                }
                
                const t = tp.progress;
                tp.sprite.position.lerpVectors(tp.start, spriteGroup.position, t);
                tp.sprite.material.opacity = 1 - t;
            }
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // --- Chat System ---
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages');
        const username = 'User_' + Math.floor(Math.random() * 999);

        function addMessage(type, text, user) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const time = new Date().toLocaleTimeString('en-US', {hour12: false, hour: '2-digit', minute: '2-digit'});

            const ts = document.createElement('span');
            ts.className = 'timestamp';
            ts.textContent = `[${time}]`;
            div.appendChild(ts);
            div.appendChild(document.createTextNode(' '));

            if (type !== 'system') {
                const uSpan = document.createElement('span');
                uSpan.className = 'username';
                uSpan.textContent = `${user}:`;
                div.appendChild(uSpan);
                div.appendChild(document.createTextNode(' '));
            }

            div.appendChild(document.createTextNode(text));

            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (!text) return;

            // Clear immediately so rapid clicks/Enter can't duplicate the message
            messageInput.value = '';

            for (let i = 0; i < 12; i++) {
                setTimeout(() => createTransmissionParticle(), i * 50);
            }

            setTimeout(() => addMessage('user', text, username), 300);
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        messageInput.focus();
    </script>
</body>
</html>
