<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backroom Chat - Matrix Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green:       #00ff41;
            --green-dim:   rgba(0, 255, 65, 0.15);
            --green-glow:  rgba(0, 255, 65, 0.08);
            --panel-bg:    rgba(2, 8, 2, 0.92);
            --border:      rgba(0, 255, 65, 0.2);
            --border-mid:  rgba(0, 255, 65, 0.35);
            --text-dim:    rgba(0, 255, 65, 0.45);
            --black-depth: rgba(0, 4, 0, 0.96);
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            animation: pageIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            color: var(--green);
            height: 100vh;
        }

        #crt-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        #site-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 32px;
            background: var(--black-depth);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            gap: 24px;
        }
        .site-nav-logo {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--green);
            text-shadow: 0 0 16px var(--green);
            text-decoration: none;
        }
        .site-nav-links { display: flex; gap: 8px; margin-left: auto; }
        .site-nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .site-nav-link:hover { color: var(--green); background: var(--green-glow); }
        .site-nav-link.active {
            color: var(--green);
            background: var(--green-dim);
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }

        #chat-panel {
            position: fixed;
            right: 0; top: 56px;
            width: 400px;
            height: calc(100vh - 56px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(30px) saturate(180%);
            box-shadow: -20px 0 60px rgba(0,0,0,0.8);
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 15, 0, 0.4);
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); filter: brightness(1); }
            50%       { opacity: 0.3; transform: scale(0.8); filter: brightness(1.5); }
        }

        .chat-title {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--green);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 3px; }
        #messages::-webkit-scrollbar-thumb { background: var(--border-mid); }

        .message {
            font-size: 13px;
            line-height: 1.5;
            padding: 12px 16px;
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid transparent;
            border-left: 2px solid var(--border-mid);
            transition: background 0.3s;
            animation: msgIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .message:hover { background: rgba(0, 255, 65, 0.06); }
        
        @keyframes msgIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .message.system {
            border-left-color: #555;
            color: var(--text-dim);
            font-style: italic;
            background: transparent;
        }

        .timestamp { color: rgba(0,255,65,0.25); font-size: 10px; margin-right: 8px; }
        .username { color: #fff; font-weight: 700; margin-right: 8px; }

        .input-area {
            padding: 24px;
            background: rgba(0, 8, 0, 0.6);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            background: #000;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(0,255,65,0.15);
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--green);
            padding: 14px;
            font-family: inherit;
            outline: none;
        }

        #send-btn {
            background: var(--green-dim);
            border: none;
            border-left: 1px solid var(--border);
            color: var(--green);
            padding: 0 24px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        #send-btn:hover { background: var(--green); color: #000; }

        @media (max-width: 768px) {
            #chat-panel { width: 100%; height: 50vh; top: auto; bottom: 0; }
            #site-nav { padding: 0 16px; }
        }
    </style>
</head>
<body>

    <div id="crt-overlay"></div>

    <nav id="site-nav">
        <a class="site-nav-logo" href="standard.html">ETHER NEXUS</a>
        <div class="site-nav-links">
            <a class="site-nav-link" href="standard.html">Chat</a>
            <a class="site-nav-link active" href="index.html">Backroom</a>
            <a class="site-nav-link" href="outer-news.html">News</a>
        </div>
    </nav>

    <div id="chat-panel">
        <div class="chat-header">
            <div class="status-dot"></div>
            <div class="chat-title">LOCAL_NODE // CORE_ORB</div>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Initiate handshake..." maxlength="255" autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <!-- Use ESM for clean module imports in a single file -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        class NexusState {
            constructor() {
                this.messages = [];
                this.listeners = [];
                this.currentUser = 'User_' + Math.floor(Math.random() * 9999);
            }
            subscribe(callback) { this.listeners.push(callback); }
            notify() { this.listeners.forEach(cb => cb(this.messages)); }
            addMessage(text, type = 'user', user = this.currentUser) {
                const message = {
                    id: Date.now(),
                    text, type, user,
                    timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                };
                this.messages.push(message);
                if (this.messages.length > 50) this.messages.shift();
                this.notify();
            }
        }

        class MatrixEngine {
            constructor() {
                this.container = document.body;
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.clock = new THREE.Clock();
                this.orb = null;
                this.controls = null;
                this.init();
            }

            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.insertBefore(this.renderer.domElement, this.container.firstChild);
                
                this.camera.position.set(0, 0, 4);
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.enableZoom = false;

                this.createOrb();
                this.animate();

                window.addEventListener('resize', () => this.onResize());
            }

            createOrb() {
                const geometry = new THREE.IcosahedronGeometry(1.5, 64);
                
                // Shader implementation combining Wobble Displacement + Matrix Aesthetic
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uIntensity: { value: 0.15 }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        varying float vDisplacement;
                        uniform float uTime;

                        // Classic 3D Noise for wobble
                        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
                        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                        float snoise(vec3 v) {
                            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                            vec3 i  = floor(v + dot(v, C.yyy));
                            vec3 x0 = v - i + dot(i, C.xxx);
                            vec3 g = step(x0.yzx, x0.xyz);
                            vec3 l = 1.0 - g;
                            vec3 i1 = min( g.xyz, l.zxy );
                            vec3 i2 = max( g.xyz, l.zxy );
                            vec3 x1 = x0 - i1 + C.xxx;
                            vec3 x2 = x0 - i2 + C.yyy;
                            vec3 x3 = x0 - D.yyy;
                            i = mod289(i);
                            vec4 p = permute( permute( permute( 
                                        i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                                    + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                                    + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                            float n_ = 0.142857142857;
                            vec3 ns = n_ * D.wyz - D.xzx;
                            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                            vec4 x_ = floor(j * ns.z);
                            vec4 y_ = floor(j - 7.0 * x_ );
                            vec4 x = x_ *ns.x + ns.yyyy;
                            vec4 y = y_ *ns.x + ns.yyyy;
                            vec4 h = 1.0 - abs(x) - abs(y);
                            vec4 b0 = vec4( x.xy, y.xy );
                            vec4 b1 = vec4( x.zw, y.zw );
                            vec4 s0 = floor(b0)*2.0 + 1.0;
                            vec4 s1 = floor(b1)*2.0 + 1.0;
                            vec4 sh = -step(h, vec4(0.0));
                            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                            vec3 p0 = vec3(a0.xy,h.x);
                            vec3 p1 = vec3(a0.zw,h.y);
                            vec3 p2 = vec3(a1.xy,h.z);
                            vec3 p3 = vec3(a1.zw,h.w);
                            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                            m = m * m;
                            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
                        }

                        void main() {
                            vUv = uv;
                            float noise = snoise(normal + uTime * 0.5);
                            vDisplacement = noise * 0.35;
                            vec3 newPosition = position + normal * vDisplacement;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec2 vUv;
                        varying float vDisplacement;
                        uniform float uTime;

                        // Digital Code Procedural Pattern
                        float digitalPattern(vec2 uv) {
                            vec2 grid = floor(uv * vec2(20.0, 40.0));
                            float t = uTime * 2.0 + grid.y * 0.5;
                            float noise = fract(sin(dot(grid, vec2(12.9898, 78.233))) * 43758.5453);
                            float glyph = step(0.85, fract(uv.y * 40.0 + noise + t));
                            return glyph;
                        }

                        void main() {
                            float pattern = digitalPattern(vUv);
                            
                            // Matrix Green Tones
                            vec3 baseColor = vec3(0.0, 0.05, 0.0);
                            vec3 coreColor = vec3(0.0, 1.0, 0.25);
                            vec3 edgeColor = vec3(0.0, 0.4, 0.1);

                            // Blend based on pattern and displacement highlights
                            vec3 finalColor = mix(baseColor, edgeColor, pattern);
                            finalColor += coreColor * pattern * (vDisplacement + 0.5);

                            // Glow effect
                            float alpha = 0.8 + 0.2 * sin(uTime + vUv.y * 10.0);
                            gl_FragColor = vec4(finalColor, alpha);
                        }
                    `,
                    transparent: true,
                    side: THREE.DoubleSide
                });

                this.orb = new THREE.Mesh(geometry, material);
                this.scene.add(this.orb);
            }

            triggerTransmission() {
                // Intense wobble and bright flash on transmission
                if (this.orb) {
                    this.orb.material.uniforms.uIntensity.value = 1.0;
                    setTimeout(() => {
                        this.orb.material.uniforms.uIntensity.value = 0.15;
                    }, 200);
                }
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const time = this.clock.getElapsedTime();

                if (this.orb) {
                    this.orb.material.uniforms.uTime.value = time;
                    this.orb.rotation.y = time * 0.1;
                    this.orb.rotation.z = time * 0.05;
                }

                if (this.controls) this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        class TerminalController {
            constructor(state, engine) {
                this.state = state;
                this.engine = engine;
                this.input = document.getElementById('message-input');
                this.btn = document.getElementById('send-btn');
                this.display = document.getElementById('messages');

                this.setupListeners();
                this.state.addMessage("CORE_ORB ONLINE. NEURAL_SYNC ACTIVE.", "system");
            }

            setupListeners() {
                this.btn.addEventListener('click', () => this.handleSend());
                this.input.addEventListener('keypress', (e) => e.key === 'Enter' && this.handleSend());
                this.state.subscribe((messages) => this.render(messages));
            }

            handleSend() {
                const val = this.input.value.trim();
                if (!val) return;
                this.state.addMessage(val);
                this.engine.triggerTransmission();
                this.input.value = '';
                this.input.focus();
            }

            render(messages) {
                const lastMsg = messages[messages.length - 1];
                if (!lastMsg) return;
                const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
                const div = document.createElement('div');
                div.className = `message ${lastMsg.type}`;
                div.innerHTML = `
                    <span class="timestamp">[${esc(lastMsg.timestamp)}]</span>
                    ${lastMsg.type !== 'system' ? `<span class="username">${esc(lastMsg.user)}:</span>` : ''}
                    <span class="text">${esc(lastMsg.text)}</span>
                `;
                this.display.appendChild(div);
                this.display.scrollTop = this.display.scrollHeight;
            }
        }

        window.onload = () => {
            const state = new NexusState();
            const engine = new MatrixEngine();
            const terminal = new TerminalController(state, engine);
            document.getElementById('message-input').focus();
        };
    </script>
</body>
</html>
