<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backroom Chat - Matrix Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green:       #00ff41;
            --green-dim:   rgba(0, 255, 65, 0.15);
            --green-glow:  rgba(0, 255, 65, 0.08);
            --panel-bg:    rgba(2, 8, 2, 0.92);
            --border:      rgba(0, 255, 65, 0.2);
            --border-mid:  rgba(0, 255, 65, 0.35);
            --text-dim:    rgba(0, 255, 65, 0.45);
        }

        /* Page transition */
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            animation: pageIn 0.35s ease forwards;
            color: var(--green);
        }
        body.page-exit {
            animation: none !important;
            transition: opacity 0.25s ease, transform 0.25s ease !important;
            opacity: 0 !important;
            transform: translateY(-8px) !important;
            pointer-events: none;
        }

        /* Canvas sits behind everything */
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        /* ── Site navbar ── */
        #site-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 32px;
            background: rgba(0, 4, 0, 0.94);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            gap: 24px;
        }
        .site-nav-logo {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--green);
            text-shadow: 0 0 16px rgba(0,255,65,0.5);
            text-decoration: none;
        }
        .site-nav-links { display: flex; gap: 4px; margin-left: auto; }
        .site-nav-link {
            color: rgba(0,255,65,0.35);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 7px 18px;
            border-radius: 20px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .site-nav-link:hover { color: var(--green); background: var(--green-glow); }
        .site-nav-link.active {
            color: var(--green);
            background: var(--green-dim);
            border-color: rgba(0,255,65,0.3);
        }

        /* ── Full-height chat panel on the right ── */
        #chat-panel {
            position: fixed;
            right: 0; top: 56px;
            width: 380px;
            height: calc(100vh - 56px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(24px) saturate(160%);
            box-shadow: -16px 0 48px rgba(0,0,0,0.7);
        }

        /* Subtle scanline texture */
        #chat-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,65,0.015) 2px,
                rgba(0,255,65,0.015) 4px
            );
            pointer-events: none;
            z-index: 0;
        }
        #chat-panel > * { position: relative; z-index: 1; }

        .chat-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 20, 0, 0.6);
            flex-shrink: 0;
        }

        .status-dot {
            width: 9px; height: 9px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
            flex-shrink: 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.75); }
        }

        .chat-title {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 12px var(--green);
        }
        .chat-subtitle {
            margin-left: auto;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* Messages */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

        .message {
            font-size: 13px;
            line-height: 1.55;
            padding: 10px 14px;
            background: rgba(0, 40, 0, 0.25);
            border-left: 2px solid var(--border-mid);
            border-radius: 0 6px 6px 0;
            animation: msgIn 0.28s ease-out forwards;
            opacity: 0;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateX(16px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .message.system {
            background: transparent;
            border-left-color: var(--text-dim);
            color: var(--text-dim);
            font-style: italic;
            font-size: 12px;
        }

        .message .timestamp {
            color: rgba(0,255,65,0.3);
            font-size: 10px;
            margin-right: 8px;
        }
        .message .username {
            color: #fff;
            font-weight: bold;
            margin-right: 6px;
            text-shadow: 0 0 8px rgba(0,255,65,0.4);
        }

        /* Divider line */
        .chat-divider {
            height: 1px;
            background: var(--border);
            margin: 0;
            flex-shrink: 0;
        }

        /* Input area */
        .input-area {
            padding: 20px 28px;
            background: rgba(0, 12, 0, 0.8);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(0,255,65,0.1), 0 0 16px rgba(0,255,65,0.12);
        }

        #message-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: var(--green);
            padding: 12px 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            outline: none;
            caret-color: var(--green);
        }
        #message-input::placeholder { color: rgba(0,255,65,0.2); }

        #send-btn {
            background: rgba(0, 30, 0, 0.8);
            border: none;
            border-left: 1px solid var(--border);
            color: var(--green);
            padding: 12px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }
        #send-btn:hover {
            background: var(--green-dim);
            box-shadow: inset 0 0 12px rgba(0,255,65,0.15);
        }
        #send-btn:active { opacity: 0.7; }

        @media (max-width: 768px) {
            #chat-panel {
                width: 100%;
                height: 45vh;
                top: auto; bottom: 0;
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <!-- Nav top-left, well clear of the chat panel -->
    <!-- Site Navbar -->
    <nav id="site-nav">
        <a class="site-nav-logo" href="standard.html">ETHER NEXUS</a>
        <div class="site-nav-links">
            <a class="site-nav-link" href="standard.html">Chat</a>
            <a class="site-nav-link active" href="index.html">Backroom</a>
            <a class="site-nav-link" href="outer-news.html">News</a>
        </div>
    </nav>

    <!-- Full-height chat panel -->
    <div id="chat-panel">
        <div class="chat-header">
            <div class="status-dot"></div>
            <div class="chat-title">Backroom</div>
            <span class="chat-subtitle">LOCAL_NODE</span>
        </div>

        <div id="messages">
            <div class="message system">
                <span class="timestamp">[SYS]</span> Connection established...
            </div>
        </div>

        <div class="chat-divider"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Transmit sequence..." maxlength="200" autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ── 3D Scene ──
        const scene    = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog        = new THREE.FogExp2(0x000000, 0.02);

        const camera   = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.insertBefore(renderer.domElement, document.body.firstChild);

        // Sprite group
        const spriteGroup = new THREE.Group();
        scene.add(spriteGroup);

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';

        for (let i = 0; i < 60; i++) {
            const cvs = document.createElement('canvas');
            cvs.width = cvs.height = 64;
            const ctx = cvs.getContext('2d');
            const char = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillStyle = `hsl(120, 100%, ${Math.floor(Math.random() * 30 + 40)}%)`;
            ctx.font = 'bold 48px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#00FF41';
            ctx.shadowBlur = 15;
            ctx.fillText(char, 32, 32);

            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(25 * 3);
            const baseData  = new Float32Array(25 * 4);

            for (let j = 0; j < 25; j++) {
                const radius = 2.0 * Math.pow(Math.random(), 0.4);
                const theta  = Math.random() * 2 * Math.PI;
                const phi    = Math.acos(2 * Math.random() - 1);
                const bx = radius * Math.sin(phi) * Math.cos(theta);
                const by = radius * Math.sin(phi) * Math.sin(theta);
                const bz = radius * Math.cos(phi);
                positions[j*3]=bx; positions[j*3+1]=by; positions[j*3+2]=bz;
                baseData[j*4]=bx;  baseData[j*4+1]=by;  baseData[j*4+2]=bz;
                baseData[j*4+3] = Math.random() * Math.PI * 2;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const pts = new THREE.Points(geo, new THREE.PointsMaterial({
                size: 0.25 + Math.random() * 0.2,
                map: new THREE.CanvasTexture(cvs),
                transparent: true,
                opacity: Math.random() * 0.5 + 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            }));
            pts.userData.baseData = baseData;
            spriteGroup.add(pts);
        }

        // Flyer
        const flyer = {
            pos: new THREE.Vector3(-3, 0, 0),
            vel: new THREE.Vector3(2.0, 1.5, 0.8),
            bounds: { x: [-5, 4], y: [-3, 3], z: [-2, 2] },
        };

        function updateFlight(delta, time) {
            flyer.vel.x += (Math.sin(time * 0.5) * 0.3 + Math.sin(time * 1.3) * 0.2) * delta;
            flyer.vel.y += (Math.cos(time * 0.7) * 0.3 + Math.sin(time * 2.0) * 0.15) * delta;
            flyer.vel.z += Math.sin(time * 0.4) * 0.2 * delta;
            flyer.vel.multiplyScalar(0.995);
            if (flyer.vel.length() < 1.0) flyer.vel.normalize().multiplyScalar(1.0);
            flyer.pos.add(flyer.vel.clone().multiplyScalar(delta));

            ['x','y','z'].forEach(ax => {
                const [lo, hi] = flyer.bounds[ax];
                if (flyer.pos[ax] > hi) { flyer.pos[ax] = hi; flyer.vel[ax] *= -0.8; }
                if (flyer.pos[ax] < lo) { flyer.pos[ax] = lo; flyer.vel[ax] *= -0.8; }
            });

            spriteGroup.position.copy(flyer.pos);
            if (flyer.vel.length() > 0.1) spriteGroup.lookAt(flyer.pos.clone().add(flyer.vel));
            spriteGroup.rotateX(0.02);
            spriteGroup.rotateY(0.015);
            spriteGroup.scale.setScalar(1 + Math.sin(time * 3) * 0.08);
        }

        // Transmission particles
        const transmissionParticles = [];
        const codeChars = '01<>[]{}//;';

        function createTransmissionParticle() {
            const cvs = document.createElement('canvas');
            cvs.width = cvs.height = 32;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#00ff41';
            ctx.font = 'bold 24px monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 10;
            ctx.fillText(codeChars[Math.floor(Math.random() * codeChars.length)], 16, 16);

            const mat  = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cvs), transparent: true, opacity: 1, blending: THREE.AdditiveBlending });
            const startY = (Math.random() - 0.5) * 4;
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(4, startY, 0);
            sprite.scale.set(0.3, 0.3, 0.3);
            scene.add(sprite);
            transmissionParticles.push({ sprite, start: new THREE.Vector3(4, startY, 0), speed: 0.03 + Math.random() * 0.02, progress: 0 });
        }

        // Animate
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.05);
            const time  = clock.getElapsedTime();

            updateFlight(delta, time);

            camera.position.x += (flyer.pos.x * 0.3 - camera.position.x) * 0.05;
            camera.position.y += (flyer.pos.y * 0.3 - camera.position.y) * 0.05;
            camera.lookAt(flyer.pos);

            spriteGroup.children.forEach(pts => {
                const pos  = pts.geometry.attributes.position.array;
                const base = pts.userData.baseData;
                for (let i = 0; i < 25; i++) {
                    const i3 = i*3, i4 = i*4;
                    const bx = base[i4], by = base[i4+1], bz = base[i4+2], ph = base[i4+3];
                    const a = time * 0.5 + ph;
                    pos[i3]   = bx * Math.cos(a) - bz * Math.sin(a);
                    pos[i3+1] = by + Math.sin(time * 2 + ph) * 0.2;
                    pos[i3+2] = bx * Math.sin(a) + bz * Math.cos(a);
                }
                pts.geometry.attributes.position.needsUpdate = true;
            });

            for (let i = transmissionParticles.length - 1; i >= 0; i--) {
                const tp = transmissionParticles[i];
                tp.progress += tp.speed;
                if (tp.progress >= 1) { scene.remove(tp.sprite); transmissionParticles.splice(i, 1); continue; }
                tp.sprite.position.lerpVectors(tp.start, spriteGroup.position, tp.progress);
                tp.sprite.material.opacity = 1 - tp.progress;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ── Chat ──
        const messageInput     = document.getElementById('message-input');
        const sendBtn          = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages');
        const username = 'User_' + Math.floor(Math.random() * 999);

        function addMessage(type, text, user) {
            const div  = document.createElement('div');
            div.className = `message ${type}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });

            const ts = document.createElement('span');
            ts.className = 'timestamp';
            ts.textContent = `[${time}]`;
            div.appendChild(ts);
            div.appendChild(document.createTextNode(' '));

            if (type !== 'system') {
                const u = document.createElement('span');
                u.className = 'username';
                u.textContent = `${user}:`;
                div.appendChild(u);
                div.appendChild(document.createTextNode(' '));
            }
            div.appendChild(document.createTextNode(text));
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            for (let i = 0; i < 12; i++) setTimeout(() => createTransmissionParticle(), i * 50);
            setTimeout(() => addMessage('user', text, username), 300);
        });

        messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });
        messageInput.focus();

        // ── Page transitions ──
        document.querySelectorAll('a[href]').forEach(a => {
            const href = a.getAttribute('href');
            if (!href || href.startsWith('http') || href.startsWith('#') || a.target === '_blank') return;
            a.addEventListener('click', e => {
                e.preventDefault();
                document.body.classList.add('page-exit');
                setTimeout(() => { window.location.href = href; }, 260);
            });
        });
    </script>
</body>
</html>
