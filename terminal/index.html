<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ether Nexus | Backroom</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        /* ── Page-specific overrides ── */
        body { font-family: var(--font-mono); height: 100vh; }

        /* ── Skull variables ── */
        :root {
            --skull-fill:    #c8f8ff;
            --skull-outline: #0099bb;
            --socket-color:  #000408;
            --bubble-bg:     rgba(6, 18, 30, 0.95);
            --bubble-border: rgba(0, 229, 255, 0.12);
        }

        @keyframes avatarFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50%       { transform: translateY(-4px) rotate(2deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.35; transform: scale(0.75); }
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .skull-path, .eye-path {
            transition: d 0.9s cubic-bezier(0.45, 0, 0.55, 1);
        }
        .skull-avatar { animation: avatarFloat 3s ease-in-out infinite; }

        /* ── CRT overlay ── */
        #crt-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        /* ── Chat Panel ── */
        #chat-panel {
            position: fixed;
            right: 0; top: 56px;
            width: 440px;
            height: calc(100vh - 56px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            background: rgba(2, 8, 18, 0.96);
            border-left: 1px solid rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(30px) saturate(180%);
            box-shadow: -20px 0 60px rgba(0,0,0,0.85);
        }

        /* ── Header / User Profile ── */
        .chat-header {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 13px;
            background: rgba(0, 8, 18, 0.6);
            flex-shrink: 0;
            position: relative;
        }

        .header-skull-wrap {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.07);
            border: 2px solid rgba(0, 229, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s;
        }

        .header-skull-wrap::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid var(--user-color, var(--primary));
            opacity: 0.5;
            pointer-events: none;
        }

        .chat-header-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }

        .profile-username {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #e8f8ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-status {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 8px var(--accent-glow);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
            animation: pulse 2.5s infinite ease-in-out;
        }

        .profile-id {
            font-size: 10px;
            color: rgba(0, 229, 255, 0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-color-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }

        .logout-btn {
            background: none;
            border: 1px solid rgba(0, 229, 255, 0.15);
            color: rgba(0, 229, 255, 0.35);
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .logout-btn:hover {
            border-color: rgba(255, 50, 50, 0.5);
            color: rgba(255, 80, 80, 0.8);
            background: rgba(255, 0, 0, 0.05);
        }

        /* ── Messages ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 3px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.15); border-radius: 2px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .skull-circle {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.06);
            border: 1px solid rgba(0, 229, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 2px;
            overflow: hidden;
        }

        .msg-bubble {
            flex: 1;
            font-size: 15px;
            line-height: 1.55;
            padding: 11px 16px;
            background: var(--bubble-bg);
            border: 1px solid var(--bubble-border);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: #d4eef8;
            transition: background 0.2s;
        }
        .msg-bubble:hover { background: rgba(10, 30, 50, 0.95); }

        .msg-bubble .timestamp {
            color: rgba(0, 229, 255, 0.2);
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .msg-bubble .username {
            color: var(--primary);
            font-weight: 700;
            margin-right: 6px;
            text-shadow: 0 0 6px rgba(0, 229, 255, 0.4);
        }
        .msg-bubble .text { color: #b0d8f0; }

        .msg-row.system { justify-content: center; }
        .msg-row.system .msg-bubble {
            flex: none;
            font-style: italic;
            color: rgba(0, 229, 255, 0.3);
            background: transparent;
            border: none;
            border-top: 1px solid rgba(0, 229, 255, 0.07);
            border-radius: 0;
            text-align: center;
            font-size: 13px;
            padding: 4px 12px;
        }

        /* ── Input ── */
        .input-area {
            padding: 16px 20px 20px;
            background: rgba(0, 8, 18, 0.7);
            border-top: 1px solid rgba(0, 229, 255, 0.08);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(6, 20, 38, 0.9);
            border: 1px solid rgba(0, 229, 255, 0.18);
            border-radius: 50px;
            padding: 6px 6px 6px 18px;
            transition: all 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: rgba(0, 229, 255, 0.45);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.06);
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #c8e8f8;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            min-width: 0;
        }
        #message-input::placeholder { color: rgba(0, 229, 255, 0.25); }

        #send-btn {
            background: var(--primary);
            border: none;
            border-radius: 50px;
            color: #000;
            padding: 9px 22px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #send-btn:hover {
            background: #fff;
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.4);
        }
        #send-btn:active { transform: scale(0.97); }

        @media (max-width: 768px) {
            #chat-panel { width: 100%; height: 55vh; top: auto; bottom: 0; }
        }
    </style>
</head>
<body>

    <!-- Auth Overlay (uses shared.css styles) -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-vignette"></div>
        <div class="auth-crt"></div>
        <div class="auth-boot-seq" id="authBootSeq"></div>
        <div class="auth-morph state-hidden" id="authMorph">
            <div class="auth-card" id="authCard">
                <h2>CORE_ORB</h2>
                <div class="auth-subtitle">BACKROOM AUTHENTICATION v4.1</div>
                <form id="authForm" class="auth-form">
                    <div class="auth-input-group">
                        <label class="auth-input-label">Operator ID</label>
                        <input type="text" id="authUsername" class="auth-input" placeholder="Enter designation..." autocomplete="username" required>
                    </div>
                    <div class="auth-input-group">
                        <label class="auth-input-label">Neural Passkey</label>
                        <input type="password" id="authPassword" class="auth-input" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="auth-submit">Link</button>
                </form>
                <div id="authError" style="color:var(--cp-red);font-family:var(--font-mono-cp);font-size:12px;text-align:center;margin-top:16px;"></div>
            </div>
        </div>
    </div>

    <div id="crt-overlay"></div>

    <nav id="site-nav">
        <a class="site-nav-logo" href="standard.html">ETHER NEXUS</a>
        <div class="site-nav-links">
            <a class="site-nav-link" href="standard.html">Chat</a>
            <a class="site-nav-link active" href="index.html">Backroom</a>
            <a class="site-nav-link" href="outer-news.html">News</a>
        </div>
    </nav>

    <div id="chat-panel">
        <div class="chat-header">
            <div class="header-skull-wrap" id="header-skull"></div>
            <div class="chat-header-info">
                <div class="profile-username" id="profile-username">———</div>
                <div class="profile-meta">
                    <div class="chat-status">
                        <div class="status-dot"></div>
                        Online
                    </div>
                    <div class="profile-color-dot" id="profile-color-dot"></div>
                    <div class="profile-id" id="profile-id"></div>
                </div>
            </div>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Type a message..." maxlength="255" autocomplete="off">
                <button id="send-btn">Send</button>

        </div>
    </div>

    <!-- Pusher (presence channel for online count) -->
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>

    <!-- Use ESM for clean module imports in a single file -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        class NexusState {
            constructor(username) {
                this.messages = [];
                this.listeners = [];
                this.currentUser = username || 'User_' + Math.floor(Math.random() * 9999);
            }
            subscribe(callback) { this.listeners.push(callback); }
            notify() { this.listeners.forEach(cb => cb(this.messages)); }
            addMessage(text, type = 'user', user = this.currentUser) {
                const message = {
                    id: Date.now(),
                    text, type, user,
                    timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                };
                this.messages.push(message);
                if (this.messages.length > 50) this.messages.shift();
                this.notify();
            }
        }

        class MatrixEngine {
            constructor() {
                this.container = document.body;
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
                this.clock = new THREE.Clock();
                this.orbs = [];
                this.material = null;
                this.geometry = null;
                this.controls = null;
                this._prevTime = 0;
                this.init();
            }

            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                this.renderer.setClearColor(0x010205, 1);
                this.container.insertBefore(this.renderer.domElement, this.container.firstChild);

                this.camera.position.set(0, 0, 5);
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.enableZoom = false;

                this.createOrb();
                this.setOrbCount(1);
                this.animate();

                let _resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(_resizeTimer);
                    _resizeTimer = setTimeout(() => this.onResize(), 150);
                });
            }

            createOrb() {
                const geometry = new THREE.IcosahedronGeometry(1.5, 8);

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime:   { value: 0 },
                        uColor1: { value: new THREE.Color('#001133') },
                        uColor2: { value: new THREE.Color('#00e5ff') },
                    },
                    vertexShader: `
                        varying float vDistortion;
                        uniform float uTime;

                        // Classic 3D Simplex Noise
                        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
                        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                        float snoise(vec3 v) {
                            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                            vec3 i  = floor(v + dot(v, C.yyy));
                            vec3 x0 = v - i + dot(i, C.xxx);
                            vec3 g = step(x0.yzx, x0.xyz);
                            vec3 l = 1.0 - g;
                            vec3 i1 = min(g.xyz, l.zxy);
                            vec3 i2 = max(g.xyz, l.zxy);
                            vec3 x1 = x0 - i1 + C.xxx;
                            vec3 x2 = x0 - i2 + C.yyy;
                            vec3 x3 = x0 - D.yyy;
                            i = mod289(i);
                            vec4 p = permute(permute(permute(
                                        i.z + vec4(0.0, i1.z, i2.z, 1.0))
                                      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                                      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                            float n_ = 0.142857142857;
                            vec3 ns = n_ * D.wyz - D.xzx;
                            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                            vec4 x_ = floor(j * ns.z);
                            vec4 y_ = floor(j - 7.0 * x_);
                            vec4 x = x_ *ns.x + ns.yyyy;
                            vec4 y = y_ *ns.x + ns.yyyy;
                            vec4 h = 1.0 - abs(x) - abs(y);
                            vec4 b0 = vec4(x.xy, y.xy);
                            vec4 b1 = vec4(x.zw, y.zw);
                            vec4 s0 = floor(b0)*2.0 + 1.0;
                            vec4 s1 = floor(b1)*2.0 + 1.0;
                            vec4 sh = -step(h, vec4(0.0));
                            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                            vec3 p0 = vec3(a0.xy, h.x);
                            vec3 p1 = vec3(a0.zw, h.y);
                            vec3 p2 = vec3(a1.xy, h.z);
                            vec3 p3 = vec3(a1.zw, h.w);
                            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                            m = m * m;
                            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
                        }

                        void main() {
                            float noise = snoise(normal + uTime * 0.5);
                            vDistortion = noise * 0.35;
                            vec3 newPosition = position + normal * vDistortion;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying float vDistortion;
                        uniform vec3 uColor1;
                        uniform vec3 uColor2;

                        void main() {
                            float mixFactor = (vDistortion + 1.0) * 0.5;
                            vec3 color = mix(uColor1, uColor2, mixFactor);
                            gl_FragColor = vec4(color, 1.0);
                        }
                    `,
                    transparent: true,
                    side: THREE.DoubleSide
                });

                // Store shared geometry + material; meshes are created in setOrbCount
                this.geometry = geometry;
                this.material = material;
            }

            setOrbCount(count) {
                // Remove old orbs
                this.orbs.forEach(o => this.scene.remove(o));
                this.orbs = [];

                count = Math.max(1, Math.min(count, 30));

                const cols = Math.ceil(Math.sqrt(count));
                const rows = Math.ceil(count / cols);
                const maxDim = Math.max(cols, rows);

                // Scale so all orbs fit within the visible frustum
                const orbRadius = 1.5 / maxDim;
                const spacing   = orbRadius * 2.5;
                const totalH    = (rows - 1) * spacing;

                let i = 0;
                for (let r = 0; r < rows && i < count; r++) {
                    const colsInRow = Math.min(cols, count - i);
                    const rowWidth  = (colsInRow - 1) * spacing;

                    for (let c = 0; c < colsInRow; c++, i++) {
                        const orb = new THREE.Mesh(this.geometry, this.material);
                        orb.scale.setScalar(orbRadius);
                        orb.position.x = c * spacing - rowWidth / 2;
                        orb.position.y = -(r * spacing - totalH / 2);
                        // Each orb gets a unique rotation speed + random initial orientation
                        orb._speed = 0.06 + Math.random() * 0.08;
                        orb.rotation.y = Math.random() * Math.PI * 2;
                        orb.rotation.z = Math.random() * Math.PI * 2;
                        this.scene.add(orb);
                        this.orbs.push(orb);
                    }
                }
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const time  = this.clock.getElapsedTime();
                const delta = time - this._prevTime;
                this._prevTime = time;

                if (this.material) this.material.uniforms.uTime.value = time;

                this.orbs.forEach(orb => {
                    orb.rotation.y += orb._speed * delta;
                    orb.rotation.z += orb._speed * 0.5 * delta;
                });

                if (this.controls) this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // ── Skull animation ─────────────────────────────────────────────────────
        const skullPoses = [
            { // Neutral
                skull: "M100,30 C60,30 40,60 40,90 C40,110 50,120 55,145 C57,155 70,165 100,165 C130,165 143,155 145,145 C150,120 160,110 160,90 C160,60 140,30 100,30 Z",
                eyeL:  "M65,85 C55,85 55,110 65,110 C75,110 85,100 80,85 Z",
                eyeR:  "M135,85 C145,85 145,110 135,110 C125,110 115,100 120,85 Z"
            },
            { // Wide
                skull: "M100,45 C50,45 35,70 35,95 C35,115 50,125 55,145 C57,155 70,160 100,160 C130,160 143,155 145,145 C150,125 165,115 165,95 C165,70 150,45 100,45 Z",
                eyeL:  "M70,90 C50,90 50,120 70,120 C85,120 90,110 85,90 Z",
                eyeR:  "M130,90 C150,90 150,120 130,120 C115,120 110,110 115,90 Z"
            },
            { // Tilted
                skull: "M110,35 C70,30 45,60 45,95 C45,115 45,130 55,150 C57,160 75,165 105,165 C135,165 150,155 150,140 C150,115 160,105 160,85 C160,55 145,40 110,35 Z",
                eyeL:  "M75,90 C60,95 65,115 75,115 C85,115 90,105 85,90 Z",
                eyeR:  "M130,85 C145,85 145,110 135,110 C125,110 115,100 125,85 Z"
            }
        ];

        function createSkullSVG() {
            const ns = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(ns, "svg");
            svg.setAttribute("viewBox", "0 0 200 200");
            svg.style.cssText = "width:36px;height:36px;flex-shrink:0;";
            svg.classList.add("skull-avatar");

            const skullPath = document.createElementNS(ns, "path");
            skullPath.classList.add("skull-path");
            skullPath.setAttribute("fill", "var(--skull-fill)");
            skullPath.setAttribute("stroke", "var(--skull-outline)");
            skullPath.setAttribute("stroke-width", "6");
            skullPath.setAttribute("d", skullPoses[0].skull);

            const eyeL = document.createElementNS(ns, "path");
            eyeL.classList.add("eye-path");
            eyeL.setAttribute("fill", "var(--socket-color)");
            eyeL.setAttribute("d", skullPoses[0].eyeL);

            const eyeR = document.createElementNS(ns, "path");
            eyeR.classList.add("eye-path");
            eyeR.setAttribute("fill", "var(--socket-color)");
            eyeR.setAttribute("d", skullPoses[0].eyeR);

            svg.appendChild(skullPath);
            svg.appendChild(eyeL);
            svg.appendChild(eyeR);

            let idx = 0;
            const iv = setInterval(() => {
                if (!svg.isConnected) { clearInterval(iv); return; }
                idx = (idx + 1) % skullPoses.length;
                skullPath.setAttribute('d', skullPoses[idx].skull);
                eyeL.setAttribute('d', skullPoses[idx].eyeL);
                eyeR.setAttribute('d', skullPoses[idx].eyeR);
            }, 2000 + Math.random() * 1000);

            return svg;
        }

        class TerminalController {
            constructor(state, engine) {
                this.state = state;
                this.engine = engine;
                this.input = document.getElementById('message-input');
                this.btn = document.getElementById('send-btn');
                this.display = document.getElementById('messages');

                this.setupListeners();
                this.state.addMessage("CORE_ORB ONLINE. NEURAL_SYNC ACTIVE.", "system");
            }

            setupListeners() {
                this.btn.addEventListener('click', () => this.handleSend());
                this.input.addEventListener('keypress', (e) => e.key === 'Enter' && this.handleSend());
                this.state.subscribe((messages) => this.render(messages));
            }

            handleSend() {
                const val = this.input.value.trim();
                if (!val) return;
                this.state.addMessage(val);
                this.input.value = '';
                this.input.focus();
            }

            render(messages) {
                const lastMsg = messages[messages.length - 1];
                if (!lastMsg) return;
                const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

                const row = document.createElement('div');

                if (lastMsg.type === 'system') {
                    row.className = 'msg-row system';
                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';
                    bubble.textContent = lastMsg.text;
                    row.appendChild(bubble);
                } else {
                    row.className = 'msg-row';

                    // Skull avatar in circle
                    const avatarWrap = document.createElement('div');
                    avatarWrap.className = 'skull-circle';
                    avatarWrap.appendChild(createSkullSVG());

                    // Bubble
                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';

                    const ts = document.createElement('span');
                    ts.className = 'timestamp';
                    ts.textContent = `[${lastMsg.timestamp}]`;

                    const body = document.createElement('span');
                    const uname = document.createElement('span');
                    uname.className = 'username';
                    uname.textContent = lastMsg.user + ':';
                    const txt = document.createElement('span');
                    txt.className = 'text';
                    txt.textContent = ' ' + lastMsg.text;
                    body.appendChild(uname);
                    body.appendChild(txt);

                    bubble.appendChild(ts);
                    bubble.appendChild(body);
                    row.appendChild(avatarWrap);
                    row.appendChild(bubble);
                }

                this.display.appendChild(row);
                this.display.scrollTop = this.display.scrollHeight;
            }
        }

        // ── Auth Manager ────────────────────────────────────────────────────────
        class AuthManager {
            constructor() {
                this.overlay = document.getElementById('authOverlay');
                this.form    = document.getElementById('authForm');
                this.error   = document.getElementById('authError');
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                // Auto-login if already authenticated
                const saved = localStorage.getItem('nexus_user');
                if (saved) {
                    try { this.finishAuth(JSON.parse(saved)); return; }
                    catch { localStorage.removeItem('nexus_user'); }
                }
            }
            handleSubmit(e) {
                e.preventDefault();
                this.error.textContent = '';
                const username = document.getElementById('authUsername').value.trim();
                const password = document.getElementById('authPassword').value;
                if (!username)          { this.error.textContent = 'Operator ID required'; return; }
                if (password.length < 4){ this.error.textContent = 'Passkey too short';    return; }
                const color = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
                const user  = { id: 'u_' + Date.now(), username, color };
                localStorage.setItem('nexus_user', JSON.stringify(user));
                this.finishAuth(user);
            }
            finishAuth(user) {
                this.overlay.classList.add('hidden');
                initApp(user);
            }
        }

        // ── App init (called by AuthManager after login) ─────────────────────
        let appInitialized = false;
        function initApp(userData) {
            if (appInitialized) return;
            appInitialized = true;

            // Skull avatar
            const headerSkull = createSkullSVG();
            headerSkull.style.cssText = 'width:30px;height:30px;';
            document.getElementById('header-skull').appendChild(headerSkull);

            // User profile fields
            document.getElementById('profile-username').textContent = userData.username;
            document.getElementById('profile-id').textContent = userData.id;

            const colorDot = document.getElementById('profile-color-dot');
            colorDot.style.background = userData.color;
            colorDot.style.boxShadow  = `0 0 6px ${userData.color}`;

            // Tint the skull ring to user color
            document.getElementById('header-skull').style.setProperty('--user-color', userData.color);

            // Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('nexus_user');
                location.reload();
            });

            const state    = new NexusState(userData.username);
            const engine   = new MatrixEngine();
            const terminal = new TerminalController(state, engine);
            document.getElementById('message-input').focus();

            // ── Presence: orb count = people online ──────────────────────────
            fetch('/api/config').then(r => r.json()).then(cfg => {
                const pusherClient = new Pusher(cfg.pusherKey, {
                    cluster: cfg.pusherCluster,
                    authEndpoint: '/api/pusher/auth',
                    auth: { params: {
                        user_id:   userData.id,
                        user_name: userData.username,
                        user_color: userData.color,
                    }},
                });
                const ch = pusherClient.subscribe('presence-chat-room');
                ch.bind('pusher:subscription_succeeded', (members) => {
                    engine.setOrbCount(members.count);
                });
                ch.bind('pusher:member_added', () => {
                    engine.setOrbCount(ch.members.count);
                });
                ch.bind('pusher:member_removed', () => {
                    engine.setOrbCount(ch.members.count);
                });
            }).catch(() => { /* no server — stay at 1 orb */ });
        }

        window.addEventListener('DOMContentLoaded', () => new AuthManager());
    </script>

    <!-- Boot sequence runs as soon as DOM is ready, before Three.js loads -->
    <script>
        (function() {
            const bootLines = [
                "INIT KERNEL... OK",
                "MOUNTING NEURAL DRIVES... OK",
                "CHECKING FIREWALL STATUS... WARNING: BREACH DETECTED",
                "REROUTING MAINFRAME POWER...",
                "DECRYPTING PROTOCOLS: [████████░░]",
                "DECRYPTING PROTOCOLS: [██████████] DONE",
                "ESTABLISHING SECURE HANDSHAKE...",
                "ALLOCATING MEMORY BLOCKS...",
                "SYSTEM READY."
            ];
            const bootSeq = document.getElementById('authBootSeq');
            const morph   = document.getElementById('authMorph');
            const card    = document.getElementById('authCard');
            if (!bootSeq || !morph || !card) return;

            // Skip boot sequence if already logged in
            if (localStorage.getItem('nexus_user')) return;

            bootLines.forEach((line, i) => {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'auth-boot-line';
                    p.textContent = '> ' + line;
                    bootSeq.appendChild(p);
                }, i * 200);
            });
            setTimeout(() => bootSeq.classList.add('auth-boot-glitch'), 2200);
            setTimeout(() => { bootSeq.style.opacity = '0'; morph.className = 'auth-morph state-dot'; }, 2600);
            setTimeout(() => { morph.className = 'auth-morph state-line'; }, 3000);
            setTimeout(() => { morph.className = 'auth-morph state-box'; }, 3600);
            setTimeout(() => { card.classList.add('content-visible'); }, 4200);
        })();
    </script>

    <script>
        // Page transition: fade out before navigating
        document.querySelectorAll('a[href]').forEach(a => {
            const href = a.getAttribute('href');
            if (!href || href.startsWith('http') || href.startsWith('#') || a.target === '_blank') return;
            a.addEventListener('click', e => {
                e.preventDefault();
                document.body.classList.add('page-exit');
                setTimeout(() => { window.location.href = href; }, 260);
            });
        });
    </script>
