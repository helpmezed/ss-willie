<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backroom Chat - Matrix Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green:       #00ff41;
            --green-dim:   rgba(0, 255, 65, 0.15);
            --green-glow:  rgba(0, 255, 65, 0.08);
            --panel-bg:    rgba(2, 8, 2, 0.92);
            --border:      rgba(0, 255, 65, 0.2);
            --border-mid:  rgba(0, 255, 65, 0.35);
            --text-dim:    rgba(0, 255, 65, 0.45);
            --black-depth: rgba(0, 4, 0, 0.96);
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            animation: pageIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            color: var(--green);
            height: 100vh;
        }

        #crt-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        #site-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 32px;
            background: var(--black-depth);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            gap: 24px;
        }
        .site-nav-logo {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--green);
            text-shadow: 0 0 16px var(--green);
            text-decoration: none;
        }
        .site-nav-links { display: flex; gap: 8px; margin-left: auto; }
        .site-nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .site-nav-link:hover { color: var(--green); background: var(--green-glow); }
        .site-nav-link.active {
            color: var(--green);
            background: var(--green-dim);
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }

        /* ── Skull variables ── */
        :root {
            --skull-fill:    #c8ffd8;
            --skull-outline: #00aa28;
            --socket-color:  #000804;
            --bubble-bg:     rgba(22, 30, 22, 0.95);
            --bubble-border: rgba(0, 255, 65, 0.12);
        }

        @keyframes avatarFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50%       { transform: translateY(-4px) rotate(2deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.35; transform: scale(0.75); }
        }

        .skull-path, .eye-path {
            transition: d 0.9s cubic-bezier(0.45, 0, 0.55, 1);
        }
        .skull-avatar { animation: avatarFloat 3s ease-in-out infinite; }

        /* ── Panel ── */
        #chat-panel {
            position: fixed;
            right: 0; top: 56px;
            width: 400px;
            height: calc(100vh - 56px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            background: rgba(10, 14, 10, 0.96);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(30px) saturate(180%);
            box-shadow: -20px 0 60px rgba(0,0,0,0.85);
        }

        /* ── Header / User Profile ── */
        .chat-header {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(0,255,65,0.08);
            display: flex;
            align-items: center;
            gap: 13px;
            background: rgba(0, 10, 0, 0.6);
            flex-shrink: 0;
            position: relative;
        }

        .header-skull-wrap {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: rgba(0,255,65,0.07);
            border: 2px solid rgba(0,255,65,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s;
        }

        /* Colored ring tinted to user color — set via JS */
        .header-skull-wrap::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid var(--user-color, var(--green));
            opacity: 0.5;
            pointer-events: none;
        }

        .chat-header-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }

        .profile-username {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #e8ffe8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-status {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--green);
            text-shadow: 0 0 8px var(--green);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2.5s infinite ease-in-out;
        }

        .profile-id {
            font-size: 9px;
            color: rgba(0,255,65,0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-color-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }

        /* Logout button */
        .logout-btn {
            background: none;
            border: 1px solid rgba(0,255,65,0.15);
            color: rgba(0,255,65,0.35);
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .logout-btn:hover {
            border-color: rgba(255,50,50,0.5);
            color: rgba(255,80,80,0.8);
            background: rgba(255,0,0,0.05);
        }

        /* ── Messages ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 3px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(0,255,65,0.15); border-radius: 2px; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .skull-circle {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(0,255,65,0.06);
            border: 1px solid rgba(0,255,65,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 2px;
            overflow: hidden;
        }

        .msg-bubble {
            flex: 1;
            font-size: 13px;
            line-height: 1.55;
            padding: 11px 16px;
            background: var(--bubble-bg);
            border: 1px solid var(--bubble-border);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: #d4f0d4;
            transition: background 0.2s;
        }
        .msg-bubble:hover { background: rgba(28, 40, 28, 0.95); }

        .msg-bubble .timestamp {
            color: rgba(0,255,65,0.2);
            font-size: 10px;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .msg-bubble .username {
            color: var(--green);
            font-weight: 700;
            margin-right: 6px;
            text-shadow: 0 0 6px rgba(0,255,65,0.4);
        }
        .msg-bubble .text { color: #c8e8c8; }

        /* System messages */
        .msg-row.system { justify-content: center; }
        .msg-row.system .msg-bubble {
            flex: none;
            font-style: italic;
            color: rgba(0,255,65,0.3);
            background: transparent;
            border: none;
            border-top: 1px solid rgba(0,255,65,0.07);
            border-radius: 0;
            text-align: center;
            font-size: 11px;
            padding: 4px 12px;
        }

        /* ── Input ── */
        .input-area {
            padding: 16px 20px 20px;
            background: rgba(0, 8, 0, 0.7);
            border-top: 1px solid rgba(0,255,65,0.08);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(20, 30, 20, 0.9);
            border: 1px solid rgba(0,255,65,0.18);
            border-radius: 50px;
            padding: 6px 6px 6px 18px;
            transition: all 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: rgba(0,255,65,0.45);
            box-shadow: 0 0 0 3px rgba(0,255,65,0.06);
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #c8e8c8;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            min-width: 0;
        }
        #message-input::placeholder { color: rgba(0,255,65,0.25); }

        #send-btn {
            background: var(--green);
            border: none;
            border-radius: 50px;
            color: #000;
            padding: 9px 22px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        #send-btn:hover {
            background: #fff;
            box-shadow: 0 0 16px rgba(0,255,65,0.4);
        }
        #send-btn:active { transform: scale(0.97); }

        @media (max-width: 768px) {
            #chat-panel { width: 100%; height: 55vh; top: auto; bottom: 0; }
            #site-nav { padding: 0 16px; }
        }

        /* ── Auth Overlay ── */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: #000400;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            transition: opacity 0.5s, visibility 0.5s;
            overflow: hidden;
        }
        .auth-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .auth-crt {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%),
                        linear-gradient(90deg, rgba(0,255,0,0.03), transparent, rgba(0,255,0,0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 10;
        }
        .auth-vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 45%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 9;
        }
        .auth-boot-seq {
            position: absolute; top: 20px; left: 20px;
            font-size: 13px; line-height: 1.8;
            color: var(--green); text-shadow: 0 0 5px var(--green);
            z-index: 15; transition: opacity 0.3s;
        }
        .auth-boot-line { opacity: 0; animation: authTypeLine 0.1s forwards; }
        @keyframes authTypeLine { to { opacity: 1; } }

        .auth-boot-glitch {
            animation: authSevereGlitch 0.5s infinite;
            filter: drop-shadow(2px 0 #ff004190) drop-shadow(-2px 0 rgba(0,255,65,0.5));
        }
        @keyframes authSevereGlitch {
            0%   { transform: translate(0); clip-path: inset(0 0 0 0); }
            20%  { transform: translate(-5px, 2px); clip-path: inset(20% 0 80% 0); }
            40%  { transform: translate(5px, -2px); clip-path: inset(80% 0 5% 0); }
            60%  { transform: translate(-2px, 5px); clip-path: inset(40% 0 40% 0); }
            80%  { transform: translate(2px, -5px); clip-path: inset(10% 0 60% 0); }
            100% { transform: translate(0); clip-path: inset(0 0 0 0); }
        }

        .auth-morph {
            position: relative; z-index: 20;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .auth-morph.state-hidden { width: 0; height: 0; opacity: 0; }
        .auth-morph.state-dot    { width: 4px; height: 4px; background: var(--green); box-shadow: 0 0 20px 5px var(--green); opacity: 1; }
        .auth-morph.state-line   { width: 400px; height: 2px; background: var(--green); box-shadow: 0 0 15px var(--green); opacity: 1; }
        .auth-morph.state-box {
            width: 400px; height: 460px;
            background: rgba(0, 6, 0, 0.97);
            border: 1px solid var(--border-mid);
            box-shadow: 0 0 40px rgba(0,255,65,0.12), inset 0 0 30px rgba(0,255,65,0.04);
            clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            opacity: 1;
        }
        .auth-morph.state-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: var(--green); box-shadow: 0 0 10px var(--green);
            transform: scaleX(0); transform-origin: left;
            animation: authExpandBar 0.5s ease forwards 4.2s;
        }
        @keyframes authExpandBar { to { transform: scaleX(1); } }

        .auth-card {
            width: 100%; height: 100%; padding: 36px 40px;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
        }
        .auth-card.content-visible { animation: authGlitchIn 0.6s forwards; pointer-events: all; }
        @keyframes authGlitchIn {
            0%   { opacity: 0; transform: scale(0.98); filter: blur(4px); }
            50%  { opacity: 0.5; }
            55%  { opacity: 1; transform: translate(2px,0); }
            60%  { opacity: 0; transform: translate(-2px,0); }
            65%  { opacity: 1; }
            100% { opacity: 1; transform: scale(1); filter: none; }
        }

        .auth-card h2 {
            font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700;
            color: var(--green); text-shadow: 0 0 20px var(--green);
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 4px;
        }
        .auth-subtitle {
            font-size: 10px; color: var(--text-dim); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 32px;
        }
        .auth-form { display: flex; flex-direction: column; }
        .auth-input-group { margin-bottom: 20px; }
        .auth-input-label {
            display: block; font-size: 10px; color: rgba(0,255,65,0.55);
            margin-bottom: 7px; text-transform: uppercase; letter-spacing: 2px;
        }
        .auth-input {
            width: 100%;
            background: rgba(0,255,65,0.03);
            border: 1px solid rgba(0,255,65,0.2);
            color: var(--green); font-family: inherit; font-size: 14px;
            padding: 11px 14px; outline: none; transition: all 0.2s;
        }
        .auth-input:focus {
            border-color: var(--green);
            background: rgba(0,255,65,0.07);
            box-shadow: inset 0 0 12px rgba(0,255,65,0.08);
        }
        .auth-input::placeholder { color: rgba(0,255,65,0.18); }

        .auth-submit {
            width: 100%; margin-top: 8px; padding: 14px;
            background: var(--green); color: #000;
            font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700;
            border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
            transition: all 0.2s; position: relative;
        }
        .auth-submit:hover { background: #fff; box-shadow: 0 0 20px rgba(0,255,65,0.5); }
        .auth-submit::after { content: '>>'; position: absolute; right: 14px; transition: right 0.2s; }
        .auth-submit:hover::after { right: 9px; }

        @media (max-width: 500px) {
            .auth-morph.state-line { width: 90vw; }
            .auth-morph.state-box  { width: 90vw; height: 500px; }
        }
    </style>
</head>
<body>

    <!-- Auth Overlay -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-vignette"></div>
        <div class="auth-crt"></div>
        <div class="auth-boot-seq" id="authBootSeq"></div>
        <div class="auth-morph state-hidden" id="authMorph">
            <div class="auth-card" id="authCard">
                <h2>CORE_ORB</h2>
                <div class="auth-subtitle">Neural Link Authentication v4.1</div>
                <form id="authForm" class="auth-form">
                    <div class="auth-input-group">
                        <label class="auth-input-label">Operator ID</label>
                        <input type="text" id="authUsername" class="auth-input" placeholder="Enter designation..." autocomplete="username" required>
                    </div>
                    <div class="auth-input-group">
                        <label class="auth-input-label">Neural Passkey</label>
                        <input type="password" id="authPassword" class="auth-input" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="auth-submit">Link</button>
                </form>
                <div id="authError" style="color:#ff4141;font-size:11px;text-align:center;margin-top:14px;letter-spacing:1px;"></div>
            </div>
        </div>
    </div>

    <div id="crt-overlay"></div>

    <nav id="site-nav">
        <a class="site-nav-logo" href="standard.html">ETHER NEXUS</a>
        <div class="site-nav-links">
            <a class="site-nav-link" href="standard.html">Chat</a>
            <a class="site-nav-link active" href="index.html">Backroom</a>
            <a class="site-nav-link" href="outer-news.html">News</a>
        </div>
    </nav>

    <div id="chat-panel">
        <div class="chat-header">
            <div class="header-skull-wrap" id="header-skull"></div>
            <div class="chat-header-info">
                <div class="profile-username" id="profile-username">———</div>
                <div class="profile-meta">
                    <div class="chat-status">
                        <div class="status-dot"></div>
                        Online
                    </div>
                    <div class="profile-color-dot" id="profile-color-dot"></div>
                    <div class="profile-id" id="profile-id"></div>
                </div>
            </div>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Type a message..." maxlength="255" autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <!-- Use ESM for clean module imports in a single file -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        class NexusState {
            constructor(username) {
                this.messages = [];
                this.listeners = [];
                this.currentUser = username || 'User_' + Math.floor(Math.random() * 9999);
            }
            subscribe(callback) { this.listeners.push(callback); }
            notify() { this.listeners.forEach(cb => cb(this.messages)); }
            addMessage(text, type = 'user', user = this.currentUser) {
                const message = {
                    id: Date.now(),
                    text, type, user,
                    timestamp: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
                };
                this.messages.push(message);
                if (this.messages.length > 50) this.messages.shift();
                this.notify();
            }
        }

        class MatrixEngine {
            constructor() {
                this.container = document.body;
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.clock = new THREE.Clock();
                this.orb = null;
                this.controls = null;
                this.init();
            }

            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.insertBefore(this.renderer.domElement, this.container.firstChild);
                
                this.camera.position.set(0, 0, 4);
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.enableZoom = false;

                this.createOrb();
                this.animate();

                window.addEventListener('resize', () => this.onResize());
            }

            createOrb() {
                const geometry = new THREE.IcosahedronGeometry(1.5, 64);

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime:      { value: 0 },
                        uWireframe: { value: 0.0 },
                        uColor1:    { value: new THREE.Color('#003300') },
                        uColor2:    { value: new THREE.Color('#00ff41') },
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        varying float vDistortion;
                        uniform float uTime;
                        uniform float uWireframe;

                        // Classic 3D Simplex Noise
                        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
                        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                        float snoise(vec3 v) {
                            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                            vec3 i  = floor(v + dot(v, C.yyy));
                            vec3 x0 = v - i + dot(i, C.xxx);
                            vec3 g = step(x0.yzx, x0.xyz);
                            vec3 l = 1.0 - g;
                            vec3 i1 = min(g.xyz, l.zxy);
                            vec3 i2 = max(g.xyz, l.zxy);
                            vec3 x1 = x0 - i1 + C.xxx;
                            vec3 x2 = x0 - i2 + C.yyy;
                            vec3 x3 = x0 - D.yyy;
                            i = mod289(i);
                            vec4 p = permute(permute(permute(
                                        i.z + vec4(0.0, i1.z, i2.z, 1.0))
                                      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                                      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                            float n_ = 0.142857142857;
                            vec3 ns = n_ * D.wyz - D.xzx;
                            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                            vec4 x_ = floor(j * ns.z);
                            vec4 y_ = floor(j - 7.0 * x_);
                            vec4 x = x_ *ns.x + ns.yyyy;
                            vec4 y = y_ *ns.x + ns.yyyy;
                            vec4 h = 1.0 - abs(x) - abs(y);
                            vec4 b0 = vec4(x.xy, y.xy);
                            vec4 b1 = vec4(x.zw, y.zw);
                            vec4 s0 = floor(b0)*2.0 + 1.0;
                            vec4 s1 = floor(b1)*2.0 + 1.0;
                            vec4 sh = -step(h, vec4(0.0));
                            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                            vec3 p0 = vec3(a0.xy, h.x);
                            vec3 p1 = vec3(a0.zw, h.y);
                            vec3 p2 = vec3(a1.xy, h.z);
                            vec3 p3 = vec3(a1.zw, h.w);
                            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                            m = m * m;
                            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
                        }

                        void main() {
                            vUv = uv;
                            float noise = snoise(normal + uTime * 0.5);
                            vDistortion = noise * 0.35;
                            vec3 newPosition = position + normal * vDistortion;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec2 vUv;
                        varying float vDistortion;
                        uniform float uTime;
                        uniform float uWireframe;
                        uniform vec3 uColor1;
                        uniform vec3 uColor2;

                        void main() {
                            // Mix between the two colors based on distortion
                            float mixFactor = (vDistortion + 1.0) * 0.5;
                            vec3 color = mix(uColor1, uColor2, mixFactor);

                            // Wireframe mode: cyan tint + transparency
                            if (uWireframe > 0.5) {
                                color = mix(color, vec3(0.0, 1.0, 1.0), 0.3);
                                gl_FragColor = vec4(color, 0.6);
                            } else {
                                gl_FragColor = vec4(color, 1.0);
                            }
                        }
                    `,
                    wireframe: false,
                    transparent: true,
                    side: THREE.DoubleSide
                });

                this.orb = new THREE.Mesh(geometry, material);
                this.scene.add(this.orb);
            }

            triggerTransmission() {
                // no-op — wireframe pulse removed
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const time = this.clock.getElapsedTime();

                if (this.orb) {
                    this.orb.material.uniforms.uTime.value = time;
                    this.orb.rotation.y = time * 0.1;
                    this.orb.rotation.z = time * 0.05;

                }

                if (this.controls) this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // ── Skull animation ─────────────────────────────────────────────────────
        const skullPoses = [
            { // Neutral
                skull: "M100,30 C60,30 40,60 40,90 C40,110 50,120 55,145 C57,155 70,165 100,165 C130,165 143,155 145,145 C150,120 160,110 160,90 C160,60 140,30 100,30 Z",
                eyeL:  "M65,85 C55,85 55,110 65,110 C75,110 85,100 80,85 Z",
                eyeR:  "M135,85 C145,85 145,110 135,110 C125,110 115,100 120,85 Z"
            },
            { // Wide
                skull: "M100,45 C50,45 35,70 35,95 C35,115 50,125 55,145 C57,155 70,160 100,160 C130,160 143,155 145,145 C150,125 165,115 165,95 C165,70 150,45 100,45 Z",
                eyeL:  "M70,90 C50,90 50,120 70,120 C85,120 90,110 85,90 Z",
                eyeR:  "M130,90 C150,90 150,120 130,120 C115,120 110,110 115,90 Z"
            },
            { // Tilted
                skull: "M110,35 C70,30 45,60 45,95 C45,115 45,130 55,150 C57,160 75,165 105,165 C135,165 150,155 150,140 C150,115 160,105 160,85 C160,55 145,40 110,35 Z",
                eyeL:  "M75,90 C60,95 65,115 75,115 C85,115 90,105 85,90 Z",
                eyeR:  "M130,85 C145,85 145,110 135,110 C125,110 115,100 125,85 Z"
            }
        ];

        function createSkullSVG() {
            const ns = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(ns, "svg");
            svg.setAttribute("viewBox", "0 0 200 200");
            svg.style.cssText = "width:36px;height:36px;flex-shrink:0;";
            svg.classList.add("skull-avatar");

            const skullPath = document.createElementNS(ns, "path");
            skullPath.classList.add("skull-path");
            skullPath.setAttribute("fill", "var(--skull-fill)");
            skullPath.setAttribute("stroke", "var(--skull-outline)");
            skullPath.setAttribute("stroke-width", "6");
            skullPath.setAttribute("d", skullPoses[0].skull);

            const eyeL = document.createElementNS(ns, "path");
            eyeL.classList.add("eye-path");
            eyeL.setAttribute("fill", "var(--socket-color)");
            eyeL.setAttribute("d", skullPoses[0].eyeL);

            const eyeR = document.createElementNS(ns, "path");
            eyeR.classList.add("eye-path");
            eyeR.setAttribute("fill", "var(--socket-color)");
            eyeR.setAttribute("d", skullPoses[0].eyeR);

            svg.appendChild(skullPath);
            svg.appendChild(eyeL);
            svg.appendChild(eyeR);

            let idx = 0;
            const iv = setInterval(() => {
                if (!svg.isConnected) { clearInterval(iv); return; }
                idx = (idx + 1) % skullPoses.length;
                skullPath.setAttribute('d', skullPoses[idx].skull);
                eyeL.setAttribute('d', skullPoses[idx].eyeL);
                eyeR.setAttribute('d', skullPoses[idx].eyeR);
            }, 2000 + Math.random() * 1000);

            return svg;
        }

        class TerminalController {
            constructor(state, engine) {
                this.state = state;
                this.engine = engine;
                this.input = document.getElementById('message-input');
                this.btn = document.getElementById('send-btn');
                this.display = document.getElementById('messages');

                this.setupListeners();
                this.state.addMessage("CORE_ORB ONLINE. NEURAL_SYNC ACTIVE.", "system");
            }

            setupListeners() {
                this.btn.addEventListener('click', () => this.handleSend());
                this.input.addEventListener('keypress', (e) => e.key === 'Enter' && this.handleSend());
                this.state.subscribe((messages) => this.render(messages));
            }

            handleSend() {
                const val = this.input.value.trim();
                if (!val) return;
                this.state.addMessage(val);
                this.engine.triggerTransmission();
                this.input.value = '';
                this.input.focus();
            }

            render(messages) {
                const lastMsg = messages[messages.length - 1];
                if (!lastMsg) return;
                const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

                const row = document.createElement('div');

                if (lastMsg.type === 'system') {
                    row.className = 'msg-row system';
                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';
                    bubble.textContent = lastMsg.text;
                    row.appendChild(bubble);
                } else {
                    row.className = 'msg-row';

                    // Skull avatar in circle
                    const avatarWrap = document.createElement('div');
                    avatarWrap.className = 'skull-circle';
                    avatarWrap.appendChild(createSkullSVG());

                    // Bubble
                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';

                    const ts = document.createElement('span');
                    ts.className = 'timestamp';
                    ts.textContent = `[${lastMsg.timestamp}]`;

                    const body = document.createElement('span');
                    const uname = document.createElement('span');
                    uname.className = 'username';
                    uname.textContent = lastMsg.user + ':';
                    const txt = document.createElement('span');
                    txt.className = 'text';
                    txt.textContent = ' ' + lastMsg.text;
                    body.appendChild(uname);
                    body.appendChild(txt);

                    bubble.appendChild(ts);
                    bubble.appendChild(body);
                    row.appendChild(avatarWrap);
                    row.appendChild(bubble);
                }

                this.display.appendChild(row);
                this.display.scrollTop = this.display.scrollHeight;
            }
        }

        // ── Auth Manager ────────────────────────────────────────────────────────
        class AuthManager {
            constructor() {
                this.overlay = document.getElementById('authOverlay');
                this.form    = document.getElementById('authForm');
                this.error   = document.getElementById('authError');
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                // Auto-login if already authenticated
                const saved = localStorage.getItem('nexus_user');
                if (saved) {
                    try { this.finishAuth(JSON.parse(saved)); return; }
                    catch { localStorage.removeItem('nexus_user'); }
                }
            }
            handleSubmit(e) {
                e.preventDefault();
                this.error.textContent = '';
                const username = document.getElementById('authUsername').value.trim();
                const password = document.getElementById('authPassword').value;
                if (!username)          { this.error.textContent = 'Operator ID required'; return; }
                if (password.length < 4){ this.error.textContent = 'Passkey too short';    return; }
                const color = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
                const user  = { id: 'u_' + Date.now(), username, color };
                localStorage.setItem('nexus_user', JSON.stringify(user));
                this.finishAuth(user);
            }
            finishAuth(user) {
                this.overlay.classList.add('hidden');
                initApp(user);
            }
        }

        // ── App init (called by AuthManager after login) ─────────────────────
        let appInitialized = false;
        function initApp(userData) {
            if (appInitialized) return;
            appInitialized = true;

            // Skull avatar
            const headerSkull = createSkullSVG();
            headerSkull.style.cssText = 'width:30px;height:30px;';
            document.getElementById('header-skull').appendChild(headerSkull);

            // User profile fields
            document.getElementById('profile-username').textContent = userData.username;
            document.getElementById('profile-id').textContent = userData.id;

            const colorDot = document.getElementById('profile-color-dot');
            colorDot.style.background = userData.color;
            colorDot.style.boxShadow  = `0 0 6px ${userData.color}`;

            // Tint the skull ring to user color
            document.getElementById('header-skull').style.setProperty('--user-color', userData.color);

            // Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('nexus_user');
                location.reload();
            });

            const state    = new NexusState(userData.username);
            const engine   = new MatrixEngine();
            const terminal = new TerminalController(state, engine);
            document.getElementById('message-input').focus();
        }

        window.addEventListener('DOMContentLoaded', () => new AuthManager());
    </script>

    <!-- Boot sequence runs as soon as DOM is ready, before Three.js loads -->
    <script>
        (function() {
            const bootLines = [
                "INIT KERNEL... OK",
                "MOUNTING NEURAL DRIVES... OK",
                "CHECKING FIREWALL STATUS... WARNING: BREACH DETECTED",
                "REROUTING MAINFRAME POWER...",
                "DECRYPTING PROTOCOLS: [████████░░]",
                "DECRYPTING PROTOCOLS: [██████████] DONE",
                "ESTABLISHING SECURE HANDSHAKE...",
                "ALLOCATING MEMORY BLOCKS...",
                "SYSTEM READY."
            ];
            const bootSeq = document.getElementById('authBootSeq');
            const morph   = document.getElementById('authMorph');
            const card    = document.getElementById('authCard');
            if (!bootSeq || !morph || !card) return;

            // Skip boot sequence if already logged in
            if (localStorage.getItem('nexus_user')) return;

            bootLines.forEach((line, i) => {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'auth-boot-line';
                    p.textContent = '> ' + line;
                    bootSeq.appendChild(p);
                }, i * 200);
            });
            setTimeout(() => bootSeq.classList.add('auth-boot-glitch'), 2200);
            setTimeout(() => { bootSeq.style.opacity = '0'; morph.className = 'auth-morph state-dot'; }, 2600);
            setTimeout(() => { morph.className = 'auth-morph state-line'; }, 3000);
            setTimeout(() => { morph.className = 'auth-morph state-box'; }, 3600);
            setTimeout(() => { card.classList.add('content-visible'); }, 4200);
        })();
    </script>
